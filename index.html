<!-- Firebase compat — încărcat înainte de scriptul aplicației -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
'use strict';
const VERSION=(document.title.match(/V[\d]+[a-z]*/i)||['V43b'])[0]||'V43b';

// ══════════════════════════════════════════════════════════════
// ── Firebase Config + Init ─────────────────────────────────
// ══════════════════════════════════════════════════════════════
const FB_CFG={
  apiKey:"AIzaSyAPv2mBDPAcZ1isyR0FD4Vha7ymYRd6gaw",
  authDomain:"project-board-1fe7c.firebaseapp.com",
  projectId:"project-board-1fe7c",
  storageBucket:"project-board-1fe7c.firebasestorage.app",
  messagingSenderId:"435410220864",
  appId:"1:435410220864:web:bd601ccad6e5e60ae96ca5"
};
var fbApp=null,fbAuth=null,fbDb=null,fbUser=null;
/* Firestore Rules necesare (console.firebase.google.com → Firestore → Rules):
rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /users/{docId} {
      allow read, write: if request.auth != null
        && docId.matches(request.auth.uid + '.*');
    }
  }
}
*/
function fbInitCore(){
  fbApp=firebase.apps.length?firebase.apps[0]:firebase.initializeApp(FB_CFG);
  fbAuth=firebase.auth();
  fbDb=firebase.firestore();
  fbAuth.onAuthStateChanged(function(user){
    fbUser=user;
    S.fbUser=user?{uid:user.uid,name:user.displayName,email:user.email,photo:user.photoURL}:null;
    if(user){
      fbPullIfNewer();
      // Calendar auto la prima lansare zilnică — după auth Firebase
      calCheckAndFetch();
    }
    render();
  });
}
function fbInit(){
  if(typeof firebase!=='undefined'){
    try{fbInitCore();}catch(e){console.warn('Firebase init error:',e);}
    return;
  }
  // SDK nu e disponibil imediat (PWA cache) — retry după 800ms
  console.warn('Firebase SDK not ready, retrying...');
  setTimeout(function(){
    if(typeof firebase!=='undefined'){
      try{fbInitCore();}catch(e){console.warn('Firebase init retry error:',e);}
    } else {
      console.warn('Firebase SDK unavailable after retry. Sync disabled.');
    }
  }, 800);
}

// ── Firebase Auth ──
function fbLogin(){
  if(!fbAuth) return;
  var provider=new firebase.auth.GoogleAuthProvider();
  fbAuth.signInWithPopup(provider).catch(function(e){
    alert('Login error: '+e.message);
  });
}
function fbLogout(){
  if(!fbAuth) return;
  fbAuth.signOut();
}

// ── Construiește payload pentru Firestore ──
function fbPayloadData(){
  return {
    items:S.items,
    nextOrder:S.nextOrder,
    freeTasks:S.freeTasks,
    waitOrder:S.waitOrder,
    waitFreeTasks:S.waitFreeTasks,
    labels:S.labels,
    ts:Date.now()
  };
}
function fbPayloadShare(){
  return {shareTasks:S.shareTasks,mergeFlags:S.mergeFlags,ts:Date.now()};
}
function fbPayloadJournal(){
  return {journal:S.journal,ts:Date.now()};
}
function fbPayloadShareJournal(){
  return {shareJournal:S.shareJournal,ts:Date.now()};
}

// ── Push: scrie tot în Firestore ──

// ── Merge per-item cu modifiedTs + tombstones ──
// Merges two arrays by id: winner = item cu modifiedTs mai mare.
// Tombstone: {id, _deleted:true, modifiedTs} — câștigă dacă e mai recent.
function mergeItemArray(localArr, remoteArr){
  var map={};
  (localArr||[]).forEach(function(x){map[x.id]=x;});
  (remoteArr||[]).forEach(function(x){
    var l=map[x.id];
    if(!l){map[x.id]=x;} // nou în remote — adaugă
    else{
      var lt=l.modifiedTs||l.ts||0;
      var rt=x.modifiedTs||x.ts||0;
      if(rt>lt) map[x.id]=x; // remote mai recent — câștigă
      // altfel local rămâne
    }
  });
  // Filtrează tombstone-urile (eliminate din array — nu le afișăm)
  return Object.values(map).filter(function(x){return !x._deleted;});
}
// Merge tasks în interiorul unui proiect
function mergeProjectTasks(localTasks, remoteTasks){
  return mergeItemArray(localTasks||[], remoteTasks||[]);
}
// Merge array de proiecte/secțiuni, inclusiv tasks-urile din fiecare proiect
function mergeProjects(localItems, remoteItems){
  var map={};
  (localItems||[]).forEach(function(x){map[x.id]=x;});
  (remoteItems||[]).forEach(function(x){
    var l=map[x.id];
    if(!l){map[x.id]=x;}
    else{
      var lt=l.modifiedTs||0;
      var rt=x.modifiedTs||0;
      if(x._deleted){
        if(rt>lt) map[x.id]=x; // ștergere remote mai recentă
      } else if(l._deleted){
        if(lt>rt) {} // local șters mai recent — rămâne
        else map[x.id]=x;
      } else {
        // Niciuna nu e ștearsă — merge la nivel de proiect
        var winner=rt>lt?x:l;
        // tasks: merge independent indiferent de câștigătorul proiectului
        if(l.type==='project'&&x.type==='project'){
          winner=Object.assign({},winner,{tasks:mergeProjectTasks(l.tasks,x.tasks)});
        }
        map[x.id]=winner;
      }
    }
  });
  return Object.values(map).filter(function(x){return !x._deleted;});
}

async function fbPush(){
  if(!fbDb||!fbUser) return {ok:false,err:'not authenticated'};
  // Refuză push cu date demo — protecție împotriva suprascrierii accidentale
  if(!fbIsRealData(S.items,S.freeTasks)){
    return {ok:false,err:'Date demo detectate — push anulat pentru protecție'};
  }
  try{
    var uid=fbUser.uid;
    var col=fbDb.collection('users');
    await Promise.all([
      col.doc(uid+'-data').set(Object.assign({uid:uid},fbPayloadData())),
      col.doc(uid+'-share').set(Object.assign({uid:uid},fbPayloadShare())),
      col.doc(uid+'-journal').set(Object.assign({uid:uid},fbPayloadJournal())),
      col.doc(uid+'-sj').set(Object.assign({uid:uid},fbPayloadShareJournal()))
    ]);
    return {ok:true};
  }catch(e){console.warn('fbPush error:',e);return {ok:false,err:e.message||String(e)};}
}

// ── Validare: datele sunt reale (nu demo) ──
var DEMO_IDS=['id_demo_p1','id_demo_p2','id_demo_f1','id_demo_f2','id_demo_s1','id_demo_s2'];
function fbIsRealData(items,freeTasks){
  // Sunt reale dacă există cel puțin un item cu id care nu e demo
  var allIds=(items||[]).map(function(x){return x.id;})
    .concat((freeTasks||[]).map(function(x){return x.id;}));
  return allIds.some(function(id){return DEMO_IDS.indexOf(id)<0;});
}

// ── Backup local înainte de Pull ──
function fbBackupLocal(){
  var backup={
    items:S.items,nextOrder:S.nextOrder,freeTasks:S.freeTasks,
    waitOrder:S.waitOrder,waitFreeTasks:S.waitFreeTasks,
    shareTasks:S.shareTasks,labels:S.labels,ts:Date.now()
  };
  lw('pb-fb-backup',backup);
}

// ── Pull: citește din Firestore și actualizează local ──
// forceOverwrite=true  → Pull manual: suprascrie întotdeauna dacă date reale
// forceOverwrite=false → Pull automat: compară ts, câștigă cel mai recent
// ── Pull: citește din Firestore și actualizează local ──
// mode='overwrite' → suprascrie tot (Pull manual clasic)
// mode='merge'     → merge per-item cu modifiedTs (conflict resolution)
// mode='auto'      → compară ts, suprascrie doar dacă remote mai nou
async function fbPull(mode){
  if(!fbDb||!fbUser) return false;
  // compatibilitate cu vechile apeluri boolean
  if(mode===true) mode='overwrite';
  if(mode===false) mode='auto';
  try{
    var uid=fbUser.uid;
    var col=fbDb.collection('users');
    var snaps=await Promise.all([
      col.doc(uid+'-data').get(),
      col.doc(uid+'-share').get(),
      col.doc(uid+'-journal').get(),
      col.doc(uid+'-sj').get()
    ]);
    var rData=snaps[0].exists?snaps[0].data():null;
    var rShare=snaps[1].exists?snaps[1].data():null;
    var rJournal=snaps[2].exists?snaps[2].data():null;
    var rSJ=snaps[3].exists?snaps[3].data():null;

    // Backup local înainte de orice modificare
    fbBackupLocal();

    if(rData){
      var remoteItems=rData.items||[];
      var remoteTs=rData.ts||0;
      var localTs=ls('pb-last-push-ts')||0;

      if(mode==='merge' && fbIsRealData(remoteItems,rData.freeTasks)){
        // ── MERGE per-item: combină local + remote, câștigă modifiedTs mai mare ──
        S.items=mergeProjects(S.items, remoteItems);
        S.freeTasks=mergeItemArray(S.freeTasks, rData.freeTasks||[]);
        // nextOrder: union dedup
        var knownIds=new Set((S.freeTasks).map(function(x){return x.id;}));
        S.items.forEach(function(it){if(it.type==='project')(it.tasks||[]).forEach(function(t){knownIds.add(t.id);});});
        var seenOrd=new Set();
        var mergedOrd=[];
        (S.nextOrder||[]).concat(rData.nextOrder||[]).forEach(function(e){
          var key=e.type==='free'?'f:'+e.id:'p:'+e.projectId+':'+e.taskId;
          if(!seenOrd.has(key)&&knownIds.has(e.type==='free'?e.id:e.taskId)){seenOrd.add(key);mergedOrd.push(e);}
        });
        S.nextOrder=mergedOrd;
        S.labels=rData.labels||S.labels;
        lw('pb-last-push-ts',Date.now());
        lw('pb-local-dirty-ts',0);
      } else {
        var shouldOverwrite=(mode==='overwrite')
          ? fbIsRealData(remoteItems,rData.freeTasks)
          : (remoteTs>localTs && fbIsRealData(remoteItems,rData.freeTasks));
        if(shouldOverwrite){
          S.items=remoteItems;
          S.nextOrder=rData.nextOrder||S.nextOrder;
          S.freeTasks=rData.freeTasks||S.freeTasks;
          S.waitOrder=rData.waitOrder||S.waitOrder;
          S.waitFreeTasks=rData.waitFreeTasks||S.waitFreeTasks;
          S.labels=rData.labels||S.labels;
          lw('pb-last-push-ts',remoteTs);
          lw('pb-local-dirty-ts',0);
        } else if(!fbIsRealData(remoteItems,rData.freeTasks)){
          console.log('fbPull: remote has only demo data, skipping');
        } else {
          console.log('fbPull: local is newer (localTs='+localTs+' remoteTs='+remoteTs+'), skipping');
        }
      }
      lw(SK,S.items);lw(NK,S.nextOrder);lw(FK,S.freeTasks);
      lw(WK,S.waitOrder);lw(WFK,S.waitFreeTasks);lw(LBLK,S.labels);
    }
    // Share: merge per-item
    if(rShare){
      var rShareTs=rShare.ts||0;
      var localTs2=ls('pb-last-push-ts')||0;
      if(mode==='merge'||mode==='overwrite'||rShareTs>localTs2){
        if(mode==='merge'){
          S.shareTasks=mergeItemArray(S.shareTasks, rShare.shareTasks||[]);
        } else {
          S.shareTasks=rShare.shareTasks||S.shareTasks;
          S.mergeFlags=rShare.mergeFlags||S.mergeFlags;
        }
        lw(SHK,S.shareTasks);lw(MK,S.mergeFlags);
      }
    }
    // Journal: întotdeauna append+dedup
    if(rJournal){
      var seen=new Set(S.journal.map(function(x){return x.ts+'|'+(x.kind||'');}));
      var extra=(rJournal.journal||[]).filter(function(x){return !seen.has(x.ts+'|'+(x.kind||''));});
      if(extra.length){S.journal=S.journal.concat(extra).sort(function(a,b){return a.ts-b.ts;});lw(JK,S.journal);}
    }
    if(rSJ){
      var seen2=new Set(S.shareJournal.map(function(x){return x.ts+'|'+(x.kind||'');}));
      var extra2=(rSJ.shareJournal||[]).filter(function(x){return !seen2.has(x.ts+'|'+(x.kind||''));});
      if(extra2.length){S.shareJournal=S.shareJournal.concat(extra2).sort(function(a,b){return a.ts-b.ts;});lw(SHJK,S.shareJournal);}
    }
    return true;
  }catch(e){console.warn('fbPull error:',e);alert('Pull error: '+(e.message||e));return false;}
}

// ── Pull automat la deschidere — compară ts remote cu ts ultimului push local ──
// ── Sync automat la startup: push dacă dirty + pull dacă remote mai nou ──
async function fbPullIfNewer(){
  if(!fbDb||!fbUser) return;
  try{
    var uid=fbUser.uid;
    var snap=await fbDb.collection('users').doc(uid+'-data').get();
    if(!snap.exists){
      // Prima dată pe acest cont — push datele locale dacă sunt reale
      if(fbIsRealData(S.items,S.freeTasks)){
        console.log('fbStartupSync: first time, pushing local data');
        var r=await fbPush();
        if(r.ok){lw('pb-last-push-ts',Date.now());lw('pb-local-dirty-ts',0);}
      }
      return;
    }
    var remoteTs=snap.data().ts||0;
    var lastPushTs=ls('pb-last-push-ts')||0;
    var dirtyTs=ls('pb-local-dirty-ts')||0;
    var hasDirty=dirtyTs>lastPushTs && dirtyTs>0 && fbIsRealData(S.items,S.freeTasks);
    var hasRemoteNew=remoteTs>lastPushTs;

    if(hasDirty && hasRemoteNew){
      // Ambele au date noi → merge automat
      var okM=await fbPull('merge');
      if(okM){
        var resM=await fbPush();
        if(resM.ok){
          lw('pb-last-push-ts',Date.now());lw('pb-local-dirty-ts',0);
          var d2=new Date(remoteTs);
          var ds2=d2.toLocaleDateString('ro-RO')+' '+d2.toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'});
          fbToast('☁⟳ Merge automat la lansare (remote din '+ds2+')','#0F2A1A','#10B981',4000);
          render();
        }
      }
    } else if(hasDirty){
      // Doar local dirty → push
      var res=await fbPush();
      if(res.ok){
        lw('pb-last-push-ts',Date.now());lw('pb-local-dirty-ts',0);
        fbToast('☁↑ Push automat la lansare','#0F2A1A','#10B981',3000);
      }
    } else if(hasRemoteNew){
      // Doar remote mai nou → pull
      var ok=await fbPull('auto');
      if(ok){
        lw('pb-last-push-ts',remoteTs);lw('pb-local-dirty-ts',0);
        var d=new Date(remoteTs);
        var ds=d.toLocaleDateString('ro-RO')+' '+d.toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'});
        fbToast('☁↓ Pull automat la lansare: date din '+ds,'#0F2A1A','#10B981',3000);
        render();
      }
    }
    // dacă nimic nu e nou — tăcere, nu afișăm nimic
  }catch(e){console.warn('fbPullIfNewer error:',e);}
}

// ── Smart Sync: compară ts remote vs local, decide Push sau Pull ──
async function fbSync(){
  if(!fbUser){fbLogin();return;}
  if(!fbDb) return;
  var dot=document.getElementById('sdot');
  if(dot){dot.textContent='⟳';dot.style.color='#818CF8';}
  try{
    // Citește ts-ul din Firestore (rapid, un singur document)
    var uid=fbUser.uid;
    var snap=await fbDb.collection('users').doc(uid+'-data').get();
    var remoteTs=snap.exists?(snap.data().ts||0):0;
    var localTs=ls('pb-last-push-ts')||0;

    if(!snap.exists || localTs>=remoteTs){
      // Local mai nou sau Firestore gol → PUSH
      if(!fbIsRealData(S.items,S.freeTasks)){
        if(dot){dot.textContent='☁✗';dot.style.color='#EF4444';setTimeout(function(){dot.textContent='';},3000);}
        fbToast('⚠ Date demo — push anulat','#1A0A0A','#EF4444',5000);
        return;
      }
      var res=await fbPush();
      if(res.ok){
        var nowTs=Date.now();
        lw('pb-last-push-ts',nowTs);
        lw('pb-local-dirty-ts',0); // local e în sync cu remote
        var pc=S.items.filter(function(x){return x.type==='project';}).length;
        var tc=S.items.reduce(function(a,x){return a+(x.tasks?x.tasks.length:0);},0);
        if(dot){dot.textContent='☁↑';dot.style.color='#10B981';setTimeout(function(){dot.textContent='';},2500);}
        fbToast('☁↑ Push: '+pc+' proj, '+tc+' tasks','#0F2A1A','#10B981',3000);
      } else {
        if(dot){dot.textContent='☁✗';dot.style.color='#EF4444';setTimeout(function(){dot.textContent='';},3000);}
        fbToast('Firebase error: '+(res.err||'unknown'),'#1A0A0A','#EF4444',6000);
      }
    } else {
      // Remote mai nou — verifică dacă există și modificări locale nepublicate
      var dirtyTs=ls('pb-local-dirty-ts')||0;
      var lastPushTs2=ls('pb-last-push-ts')||0;
      if(dirtyTs>lastPushTs2 && dirtyTs>0){
        // CONFLICT: remote mai nou DAR există modificări locale nesincronizate
        // → Merge automat per-item: modifiedTs decide câștigătorul fiecărui item
        if(dot){dot.textContent='☁⟳';dot.style.color='#F59E0B';setTimeout(function(){dot.textContent='';},5000);}
        var okM=await fbPull('merge');
        if(okM){
          var resM=await fbPush();
          if(resM.ok){
            var nowTsM=Date.now();
            lw('pb-last-push-ts',nowTsM);
            lw('pb-local-dirty-ts',0);
            var d2=new Date(remoteTs);
            var ds2=d2.toLocaleDateString('ro-RO')+' '+d2.toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'});
            if(dot){dot.textContent='☁⟳';dot.style.color='#10B981';setTimeout(function(){dot.textContent='';},2500);}
            fbToast('☁⟳ Merge automat cu remote din '+ds2,'#0F2A1A','#10B981',4000);
            render();
          } else {
            if(dot){dot.textContent='☁✗';dot.style.color='#EF4444';setTimeout(function(){dot.textContent='';},3000);}
            fbToast('Merge ok, push error: '+(resM.err||'unknown'),'#1A0A0A','#EF4444',6000);
          }
        } else {
          if(dot){dot.textContent='☁✗';dot.style.color='#EF4444';setTimeout(function(){dot.textContent='';},3000);}
        }
      } else {
        // Remote mai nou, fără modificări locale → Pull pur
        if(dot){dot.textContent='☁↓';dot.style.color='#818CF8';setTimeout(function(){dot.textContent='';},5000);}
        var okP=await fbPull('overwrite');
        if(okP){
          lw('pb-last-push-ts',remoteTs);lw('pb-local-dirty-ts',0);
          var dP=new Date(remoteTs);
          var dsP=dP.toLocaleDateString('ro-RO')+' '+dP.toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'});
          if(dot){dot.textContent='☁↓';dot.style.color='#10B981';setTimeout(function(){dot.textContent='';},2500);}
          fbToast('☁↓ Pull: date din '+dsP,'#0F2A1A','#10B981',3000);
          render();
        } else {
          if(dot){dot.textContent='☁✗';dot.style.color='#EF4444';setTimeout(function(){dot.textContent='';},3000);}
          fbToast('Pull error','#1A0A0A','#EF4444',5000);
        }
      }
    }
  }catch(e){
    if(dot){dot.textContent='☁✗';dot.style.color='#EF4444';setTimeout(function(){dot.textContent='';},3000);}
    fbToast('Sync error: '+e.message,'#1A0A0A','#EF4444',6000);
  }
}

// ══════════════════════════════════════════════════════════════
// ── Google Calendar OAuth + Fetch ──────────────────────────
// Flux: Implicit Grant (token în URL hash) — fără client secret
// ══════════════════════════════════════════════════════════════

function calTodayStr(){
  // Returnează YYYY-MM-DD în timezone local
  var d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

// Verifică dacă tokenul din localStorage e valid (ne-expirat)
function calGetToken(){
  try{
    var t=JSON.parse(localStorage.getItem(CAL_CK)||'null');
    if(!t||!t.access_token||!t.expires_at) return null;
    if(Date.now()>t.expires_at-60000) return null; // expiră în <1 min
    return t.access_token;
  }catch(_){return null;}
}
function calSaveToken(access_token, expires_in, email){
  localStorage.setItem(CAL_CK,JSON.stringify({
    access_token:access_token,
    expires_at:Date.now()+parseInt(expires_in||3600)*1000
  }));
  if(email) localStorage.setItem('pb-cal-email',email);
}
function calClearToken(){localStorage.removeItem(CAL_CK);}

// Pornește fluxul OAuth — redirect la Google
function calLogin(){
  var state=Math.random().toString(36).substr(2,10);
  sessionStorage.setItem('cal_oauth_state',state);
  var savedEmail=localStorage.getItem('pb-cal-email')||'';
  var p={
    client_id:GCAL_CLIENT_ID,
    redirect_uri:GCAL_REDIRECT,
    response_type:'token',
    scope:GCAL_SCOPE,
    state:state
  };
  // Dacă avem email memorat → pre-selectează contul, fără ecran de selecție
  if(savedEmail){
    p.login_hint=savedEmail;
    p.prompt='none'; // încearcă silent; dacă eșuează Google va afișa oricum UI
  } else {
    p.prompt='select_account';
  }
  window.location.href='https://accounts.google.com/o/oauth2/v2/auth?'+new URLSearchParams(p).toString();
}

// Procesează token-ul din URL hash după redirect OAuth
function calHandleCallback(){
  var hash=window.location.hash;
  if(!hash||hash.indexOf('access_token')<0) return false;
  var params=new URLSearchParams(hash.replace(/^#/,''));
  var token=params.get('access_token');
  var expiresIn=params.get('expires_in')||3600;
  var state=params.get('state');
  history.replaceState({},'',window.location.pathname+window.location.search);
  if(!token) return false;
  calSaveToken(token,expiresIn);
  // Fetch email din tokeninfo — îl salvăm pentru login_hint la re-autorizare
  fetch('https://www.googleapis.com/oauth2/v3/tokeninfo?access_token='+token)
    .then(function(r){return r.json();})
    .then(function(d){if(d&&d.email) localStorage.setItem('pb-cal-email',d.email);})
    .catch(function(){});
  return true;
}

// Fetch evenimente din TOATE calendarele (primary + Nozbe + orice altul)
// timeMin = prima zi a lunii curente — prinde evenimente multi-zi lunare (ex: Rl9z)
async function calFetchEvents(token){
  var now=new Date();
  var monthStart=new Date(now.getFullYear(),now.getMonth(),1,0,0,0);
  var tomorrowEnd=new Date(now.getFullYear(),now.getMonth(),now.getDate()+2,0,0,0);
  var todayStr=calTodayStr();
  var headers={Authorization:'Bearer '+token};

  // 1. Obține lista tuturor calendarelor accesibile
  var calIds=['primary']; // fallback dacă calendarList eșuează
  try{
    var listResp=await fetch('https://www.googleapis.com/calendar/v3/users/me/calendarList',{headers:headers});
    if(listResp.status===401){calClearToken();return null;}
    if(listResp.ok){
      var listData=await listResp.json();
      calIds=(listData.items||[]).map(function(c){return c.id;});
      if(!calIds.length) calIds=['primary'];
    }
  }catch(_){}

  // 2. Fetch events din fiecare calendar, în paralel
  function fetchCal(calId){
    var url='https://www.googleapis.com/calendar/v3/calendars/'+encodeURIComponent(calId)+'/events?'+
      'timeMin='+encodeURIComponent(monthStart.toISOString())+
      '&timeMax='+encodeURIComponent(tomorrowEnd.toISOString())+
      '&singleEvents=true&orderBy=startTime&maxResults=100';
    return fetch(url,{headers:headers}).then(function(r){
      if(!r.ok) return [];
      return r.json().then(function(d){return d.items||[];});
    }).catch(function(){return [];});
  }

  var allArrays=await Promise.all(calIds.map(fetchCal));

  // 3. Aplatizează + deduplicare după ev.id
  var seen={};
  var allItems=[];
  allArrays.forEach(function(arr){
    arr.forEach(function(ev){
      if(!seen[ev.id]){seen[ev.id]=true;allItems.push(ev);}
    });
  });

  // 4. Filtrare
  var events=allItems.filter(function(ev){
    if(!ev.summary||!ev.summary.trim()) return false;
    // Ignoră evenimentele auto-generate de Google Tasks ("Tasks for ...")
    if(/^Tasks for\b/i.test(ev.summary.trim())) return false;
    var endDate='';
    if(ev.end) endDate=(ev.end.date||ev.end.dateTime||'').slice(0,10);
    if(endDate && endDate < todayStr) return false;
    return true;
  });

  // Sortare după startTime (fetch din mai multe calendare poate fi neordonat)
  events.sort(function(a,b){
    var sa=(a.start&&(a.start.dateTime||a.start.date))||'';
    var sb=(b.start&&(b.start.dateTime||b.start.date))||'';
    return sa<sb?-1:sa>sb?1:0;
  });

  return events;
}

// Formatează ora unui eveniment: "09:00" sau "toată ziua"
function calFmtTime(ev){
  if(ev.start&&ev.start.dateTime){
    var d=new Date(ev.start.dateTime);
    return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  }
  return 'zi';
}

// Determină dacă evenimentul e azi, mâine, sau în curs (a început deja)
function calEvDay(ev){
  var now=new Date();
  var today=calTodayStr();
  var td1=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1);
  var tomorrow=td1.getFullYear()+'-'+String(td1.getMonth()+1).padStart(2,'0')+'-'+String(td1.getDate()).padStart(2,'0');
  var evStart=(ev.start&&(ev.start.date||ev.start.dateTime||'')).slice(0,10);
  var evEnd=(ev.end&&(ev.end.date||ev.end.dateTime||'')).slice(0,10);
  if(evStart===today) return 'today';
  if(evStart===tomorrow) return 'tomorrow';
  // A început în trecut dar nu s-a terminat → în curs
  if(evStart < today && evEnd > today) return 'ongoing';
  return evStart;
}

// Formatează eticheta unui eveniment multi-zi: "1-5 apr"
function calFmtRange(ev){
  var now=new Date();
  var months=['ian','feb','mar','apr','mai','iun','iul','aug','sep','oct','nov','dec'];
  var startStr=(ev.start&&ev.start.date)||'';
  var endStr=(ev.end&&ev.end.date)||'';
  if(!startStr||!endStr) return '';
  var s=new Date(startStr+'T00:00:00');
  // end.date e ziua după — scădem 1 zi
  var e=new Date(endStr+'T00:00:00');
  e.setDate(e.getDate()-1);
  if(s.getTime()===e.getTime()) return ''; // o singură zi — nu afișăm range
  return s.getDate()+'-'+e.getDate()+' '+months[e.getMonth()];
}

// Injectează evenimentele în NEXT (la început, fond albastru)
// Șterge evenimentele de calendar din ziua precedentă înainte
function calInjectEvents(events){
  // Construiește free tasks din evenimente — cu prefixul special 'cal::'
  var newFree=events.map(function(ev){
    var time=calFmtTime(ev);
    var day=calEvDay(ev);
    var range=calFmtRange(ev); // ex: "1-5 apr" pentru multi-zi
    var dayLabel='';
    if(day==='ongoing') dayLabel='[ongoing'+(range?' '+range:'')+'] ';
    else if(day==='tomorrow') dayLabel='[tomorrow] ';
    else if(day!=='today') dayLabel='['+day+'] ';
    var timeLabel=(time!=='zi')?' ⏰'+time:'';
    var label=dayLabel+ev.summary.trim()+(range&&day!=='ongoing'?' ('+range+')':'')+timeLabel;
    return {id:'cal::'+ev.id,name:label,ts:Date.now(),isCalEv:true};
  });

  // Șterge evenimentele de calendar vechi din freeTasks și nextOrder
  S.freeTasks=S.freeTasks.filter(function(f){return !f.id.startsWith('cal::');});
  S.nextOrder=S.nextOrder.filter(function(x){
    if(x.type==='free'){
      var f=S.freeTasks.find(function(ft){return ft.id===x.id;});
      return !!f; // dacă nu mai există în freeTasks, scoate din ordine
    }
    return true;
  });
  // Elimină și ordinile vechi cu id cal::
  S.nextOrder=S.nextOrder.filter(function(x){
    return !(x.type==='free'&&(x.id||'').startsWith('cal::'));
  });

  // Adaugă noile evenimente la începutul listei
  var newOrders=newFree.map(function(f){return {type:'free',id:f.id};});
  S.freeTasks=newFree.concat(S.freeTasks);
  S.nextOrder=newOrders.concat(S.nextOrder);
  lw(FK,S.freeTasks);lw(NK,S.nextOrder);
  // Salvează ziua curentă ca dată ultimei colectări
  localStorage.setItem(CAL_DK,calTodayStr());
}

// Verifică dacă e prima rulare a zilei și dacă avem token
var _calFetchInProgress=false;
async function calCheckAndFetch(){
  var lastDay=localStorage.getItem(CAL_DK)||'';
  var today=calTodayStr();
  if(lastDay===today) return; // deja colectat azi
  if(_calFetchInProgress) return; // fetch în curs — evităm dublu-apel
  _calFetchInProgress=true;
  var token=calGetToken();
  if(!token){_calFetchInProgress=false;return;} // nu suntem autentificați
  var events=await calFetchEvents(token);
  _calFetchInProgress=false;
  if(events===null) return; // eroare sau token expirat
  calInjectEvents(events);
  render();
}

// ── Next rows ──
// nextOrder stochează: {type:'proj',projectId,taskId} sau {type:'free',id}
// Logica selecție din To Do → NEXT:
//   - dacă proiectul are un singur task în To Do → apare automat în NEXT
//   - dacă are mai multe → doar cele care încep cu '*' apar în NEXT
//   - în NEXT numele apare fără asterisk
function getEligibleTodoPairs() {
  const pairs = [];
  S.items.forEach(it => {
    if (it.type !== 'project') return;
    const todos = (it.tasks || []).filter(t => t.status === 'next');
    if (todos.length === 0) return;
    if (todos.length === 1) {
      // Singurul task → eligibil automat
      pairs.push({ projectId: it.id, taskId: todos[0].id, warn: false });
    } else {
      const starred = todos.filter(t => t.name.startsWith('*'));
      if (starred.length > 0) {
        // Există * → doar cele cu *
        starred.forEach(t => pairs.push({ projectId: it.id, taskId: t.id, warn: false }));
      } else {
        // Niciun * → toate apar cu avertisment
        todos.forEach(t => pairs.push({ projectId: it.id, taskId: t.id, warn: true }));
      }
    }
  });
  return pairs;
}

function getNR(){
  const eligibleProj = getEligibleTodoPairs();
  const allFree = S.freeTasks.map(f => ({ type: 'free', id: f.id }));

  const projKeys = new Set(eligibleProj.map(x => x.projectId + '::' + x.taskId));
  const freeKeys = new Set(allFree.map(x => x.id));

  // Filtrăm nextOrder — păstrăm doar ce e eligibil și există încă
  const clean = S.nextOrder.filter(x => {
    if (x.type === 'free') return freeKeys.has(x.id);
    return projKeys.has((x.projectId || '') + '::' + (x.taskId || ''));
  });

  // Adăugăm la final ce e eligibil dar nu e încă în ordine
  const inOrder = new Set(clean.map(x => x.type === 'free' ? 'f::' + x.id : (x.projectId + '::' + x.taskId)));
  const newProj = eligibleProj.filter(x => !inOrder.has(x.projectId + '::' + x.taskId))
    .map(x => ({ type: 'proj', projectId: x.projectId, taskId: x.taskId }));
  const newFree = allFree.filter(x => !inOrder.has('f::' + x.id));
  const unified = [...clean, ...newProj, ...newFree];

  // Map warn pe unified din eligibleProj
  const warnMap = new Map(eligibleProj.map(x => [x.projectId + '::' + x.taskId, x.warn]));

  // Mapăm la rows — eliminăm * din nume la afișare
  return unified.map(x => {
    if (x.type === 'free') {
      const f = S.freeTasks.find(ft => ft.id === x.id);
      if (!f) return null;
      return { isFree: true, id: f.id, pname: '—', tname: f.name, warn: false };
    }
    const p = S.items.find(it => it.id === x.projectId);
    const t = p?.tasks?.find(t => t.id === x.taskId);
    if (!p || !t) return null;
    const displayName = t.name.startsWith('*') ? t.name.slice(1).trimStart() : t.name;
    const warn = warnMap.get(x.projectId + '::' + x.taskId) || false;
    return { isFree: false, projectId: x.projectId, taskId: x.taskId, pname: p.name, tname: displayName, warn };
  }).filter(Boolean);
}

// ── WAITING rows — toate task-urile cu status 'wait' ──────────
function getWR(){
  const allProj=[];
  S.items.forEach(it=>{
    if(it.type!=='project')return;
    (it.tasks||[]).forEach(t=>{if(t.status==='wait')allProj.push({type:'proj',projectId:it.id,taskId:t.id});});
  });
  const allFree=S.waitFreeTasks.map(f=>({type:'free',id:f.id}));
  const projKeys=new Set(allProj.map(x=>x.projectId+'::'+x.taskId));
  const freeKeys=new Set(allFree.map(x=>x.id));

  const clean=S.waitOrder.filter(x=>{
    if(x.type==='free')return freeKeys.has(x.id);
    return projKeys.has((x.projectId||'')+'::'+( x.taskId||''));
  });
  const inOrder=new Set(clean.map(x=>x.type==='free'?'f::'+x.id:(x.projectId+'::'+x.taskId)));
  const newProj=allProj.filter(x=>!inOrder.has(x.projectId+'::'+x.taskId));
  const newFree=allFree.filter(x=>!inOrder.has('f::'+x.id));
  const unified=[...clean,...newProj,...newFree];

  return unified.map(x=>{
    if(x.type==='free'){
      const f=S.waitFreeTasks.find(ft=>ft.id===x.id);
      if(!f)return null;
      return {isFree:true,id:f.id,pname:'—',tname:f.name};
    }
    const p=S.items.find(it=>it.id===x.projectId);
    const t=p?.tasks?.find(t=>t.id===x.taskId);
    if(!p||!t)return null;
    return {isFree:false,projectId:x.projectId,taskId:x.taskId,pname:p.name,tname:t.name};
  }).filter(Boolean);
}

function hitCell(x,y){
  const cells=document.querySelectorAll('.tcell');
  for(let c of cells){const r=c.getBoundingClientRect();if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom)return c;}

}
function hitRow(x,y,skip){
  const rows=document.querySelectorAll('[data-rid]');
  for(let r of rows){if(r.dataset.rid===skip)continue;const b=r.getBoundingClientRect();if(x>=b.left&&x<=b.right&&y>=b.top&&y<=b.bottom)return r;}

document.addEventListener('touchend',()=>{
  if(!drag)return;
  hg();

  if(drag.type==='next'){
    const toEl=document.querySelector('.nrow.dov');
    if(toEl){
      const toIdx=parseInt(toEl.dataset.nidx);
      const fromIdx=drag.fromIdx;
      const nr=getNR();
      // Build unified key list
      const ordered=nr.map(r=>r.isFree?{type:'free',id:r.id}:{type:'proj',projectId:r.projectId,taskId:r.taskId});
      const [moved]=ordered.splice(fromIdx,1);
      ordered.splice(toIdx,0,moved);
      // Save unified order — also rebuild freeTasks order
      S.nextOrder=ordered;
      // Reorder freeTasks array to match new order
      const newFreeTasks=[];
      ordered.forEach(x=>{if(x.type==='free'){const f=S.freeTasks.find(ft=>ft.id===x.id);if(f)newFreeTasks.push(f);}});
      // Add any freeTasks not in order (safety)
      S.freeTasks.forEach(f=>{if(!newFreeTasks.find(x=>x.id===f.id))newFreeTasks.push(f);});
      S.freeTasks=newFreeTasks;
      lw(NK,S.nextOrder);lw(FK,S.freeTasks);
    }
    clr();drag=null;render();return;
  }

  if(drag.type==='wait'){
    const toEl=document.querySelector('[data-widx].dov');
    if(toEl){
      const toIdx=parseInt(toEl.dataset.widx);
      const fromIdx=drag.fromIdx;
      const wr=getWR();
      const ordered=wr.map(r=>r.isFree?{type:'free',id:r.id}:{type:'proj',projectId:r.projectId,taskId:r.taskId});
      const [moved]=ordered.splice(fromIdx,1);
      ordered.splice(toIdx,0,moved);
      S.waitOrder=ordered;
      const newWF=[];
      ordered.forEach(x=>{if(x.type==='free'){const f=S.waitFreeTasks.find(ft=>ft.id===x.id);if(f)newWF.push(f);}});
      S.waitFreeTasks.forEach(f=>{if(!newWF.find(x=>x.id===f.id))newWF.push(f);});
      S.waitFreeTasks=newWF;
      lw(WK,S.waitOrder);lw(WFK,S.waitFreeTasks);
    }
    clr();drag=null;render();return;
  }

  if(drag.type==='task'){
    const c=document.querySelector('.tcell.don');
    if(c&&c.dataset.col!==drag.colId){
      const tc=c.dataset.col;
      je({kind:'task-move',taskName:drag.tn,fromCol:drag.colId,toCol:tc,projectId:drag.pid,ts:Date.now()});
      if(drag.colId==='next'){S.nextOrder=S.nextOrder.filter(x=>!(x.type==='proj'&&x.projectId===drag.pid&&x.taskId===drag.tid)||x.type==='free');lw(NK,S.nextOrder);}

      if(drag.colId==='wait'){S.waitOrder=S.waitOrder.filter(x=>!(x.type==='proj'&&x.projectId===drag.pid&&x.taskId===drag.tid));lw(WK,S.waitOrder);}
      if(tc==='wait'){S.waitOrder=[...S.waitOrder,{type:'proj',projectId:drag.pid,taskId:drag.tid}];lw(WK,S.waitOrder);}
      S.items=S.items.map(it=>it.type!=='project'||it.id!==drag.pid?it:{...it,tasks:it.tasks.map(t=>t.id===drag.tid?{...t,status:tc}:t)});
      save();
    }
  } else if(drag.type==='row'){
    const r=document.querySelector('[data-rid].dov');
    if(r){const a=[...S.items],f=a.findIndex(x=>x.id===drag.id),t=a.findIndex(x=>x.id===r.dataset.rid);if(f>-1&&t>-1){const[m]=a.splice(f,1);a.splice(t,0,m);S.items=a;save();}}
  }
  clr();drag=null;render();
});

function moveToWait(taskId, projectId){
  if(projectId){
    // Task de proiect — schimbă status în proiect și mută în waitOrder
    var proj=S.items.find(function(x){return x.id===projectId;});
    if(!proj) return;
    var task=proj.tasks.find(function(t){return t.id===taskId;});
    if(!task) return;
    je({kind:'task-move',taskName:task.name,fromCol:'next',toCol:'wait',projectId:projectId,ts:Date.now()});
    task.status='wait';
    task.modifiedTs=Date.now();
    S.nextOrder=S.nextOrder.filter(function(x){return!(x.type==='proj'&&x.projectId===projectId&&x.taskId===taskId);});
    S.waitOrder=[...S.waitOrder,{type:'proj',projectId:projectId,taskId:taskId}];
    lw(NK,S.nextOrder);lw(WK,S.waitOrder);
    save();render();
  } else {
    // Free task — mută din freeTasks/nextOrder în waitFreeTasks/waitOrder
    var ft=S.freeTasks.find(function(x){return x.id===taskId;});
    if(!ft) return;
    je({kind:'task-move',taskName:ft.name,fromCol:'next',toCol:'wait',projectId:null,ts:Date.now()});
    S.freeTasks=S.freeTasks.filter(function(x){return x.id!==taskId;});
    S.nextOrder=S.nextOrder.filter(function(x){return!(x.type==='free'&&x.id===taskId);});
    var wft={id:ft.id,name:ft.name,ts:ft.ts,modifiedTs:Date.now()};

// ── /c parser ──────────────────────────────────────────────────
var RE_CCMD=/\/c(\d{1,2})(?:\.(\d{1,2}))?(rz|rs|rl|ra)?(?:\s+(\d{1,2}:\d{2}))?/i;
// Detectează și formatul deja-setat: 📅 2.apr 14:00 (zil)
var RE_CALFMT=/📅\s*(\d{1,2})\.(ian|feb|mar|apr|mai|iun|iul|aug|sep|oct|nov|dec)(?:\s+(\d{1,2}:\d{2}))?(?:\s+\((zil|sapt|lunar|anual)\))?/i;
var MONTHS_IDX={ian:1,feb:2,mar:3,apr:4,mai:5,iun:6,iul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
function parseCalCmd(text){
  var m=text.match(RE_CCMD);
  if(!m) return null;
  var now=new Date();
  var day=parseInt(m[1]);
  var month=m[2]?parseInt(m[2]):now.getMonth()+1;
  var rep=(m[3]||'').toLowerCase()||null;
  var timeStr=m[4]||'09:00'; // default 09:00 dacă ora lipsește
  return {day:day,month:month,rep:rep,timeStr:timeStr,full:m[0]};
}
function buildGCalUrl(taskTitle, parsed){
  var year=new Date().getFullYear();
  var mm=String(parsed.month).padStart(2,'0');
  var dd=String(parsed.day).padStart(2,'0');
  var dates='';
  if(parsed.timeStr){
    var hhmm=parsed.timeStr.replace(':','');
    // end = start + 30 min
    var sh=parseInt(parsed.timeStr.split(':')[0]);
    var sm=parseInt(parsed.timeStr.split(':')[1]);
    var em=sm+30; var eh=sh+(em>=60?1:0); em=em%60;
    var ehmm=String(eh).padStart(2,'0')+String(em).padStart(2,'0');
    dates=year+mm+dd+'T'+hhmm+'00/'+year+mm+dd+'T'+ehmm+'00';
  } else {
    // all-day
    dates=year+mm+dd+'/'+year+mm+dd;
  }
  var recur='';
  if(parsed.rep==='rz') recur='&recur=RRULE:FREQ%3DDAILY';
  else if(parsed.rep==='rs') recur='&recur=RRULE:FREQ%3DWEEKLY';
  else if(parsed.rep==='rl') recur='&recur=RRULE:FREQ%3DMONTHLY';
  else if(parsed.rep==='ra') recur='&recur=RRULE:FREQ%3DYEARLY';
  var title=encodeURIComponent(taskTitle.replace(RE_CCMD,'').trim());
  return 'https://calendar.google.com/calendar/render?action=TEMPLATE&text='+title+'&dates='+dates+recur;
}
// Returnează textul fără /c... și indicatorul 📅 dacă există comandă
function stripCalCmd(text){
  return text.replace(RE_CCMD,'').replace(/\s{2,}/g,' ').trim();
}
// ───────────────────────────────────────────────────────────────

// Formatează data parsed într-un șir lizibil: "2.apr 14:00" sau "2.apr" (all-day)
var MONTHS_RO=['ian','feb','mar','apr','mai','iun','iul','aug','sep','oct','nov','dec'];
function fmtCalLabel(parsed){
  var mon=MONTHS_RO[(parsed.month-1)%12]||String(parsed.month);
  var base=parsed.day+'.'+mon;
  if(parsed.timeStr) base+=' '+parsed.timeStr;
  if(parsed.rep){
    var repLbl={rz:'zil',rs:'sapt',rl:'lunar',ra:'anual'};
    base+=' ('+( repLbl[parsed.rep]||parsed.rep)+')';
  }
  return base;
}

// Adaugă buton 📅 dacă taskul conține /c SAU 📅 dată — butonul rămâne activ mereu
function maybeAddCalBtn(rowEl, taskName, saveFn){
  var parsed=parseCalCmd(taskName);
  var isNew=!!parsed;
  // Dacă nu găsim /c, încearcă formatul deja-setat 📅 2.apr 14:00
  if(!parsed){
    var mf=taskName.match(RE_CALFMT);
    if(mf){
      var repMap={zil:'rz',sapt:'rs',lunar:'rl',anual:'ra'};
      parsed={
        day:parseInt(mf[1]),
        month:MONTHS_IDX[(mf[2]||'').toLowerCase()]||new Date().getMonth()+1,
        timeStr:mf[3]||'09:00',
        rep:mf[4]?repMap[mf[4].toLowerCase()]||null:null,
        full:mf[0]
      };
    }
  }
  if(!parsed) return;
  var btn=document.createElement('button');
  btn.textContent='📅';
  btn.title='Seteaza/modifica alarma Google Calendar ('+parsed.full+')';
  btn.style.cssText='background:#DBEAFE;color:#1D4ED8;border:1px solid #93C5FD;border-radius:6px;padding:5px 8px;font-size:14px;cursor:pointer;flex-shrink:0;touch-action:manipulation;min-width:34px;min-height:34px';
  function doCalendar(e){
    e.stopPropagation();e.preventDefault();
    var cleanTitle=isNew?stripCalCmd(taskName):taskName.replace(RE_CALFMT,'').replace(/\s{2,}/g,' ').trim();
    var url=buildGCalUrl(cleanTitle,parsed);
    window.open(url,'_blank');
    if(isNew){
      // Prima setare: înlocuiește /c cu 📅 dată formatată
      var label='📅 '+fmtCalLabel(parsed);
      var newName=taskName.replace(RE_CCMD,label).replace(/\s{2,}/g,' ').trim();
      saveFn(newName);
    }
    // Dacă deja setat (📅 format) — nu modificăm textul, doar redeschide Calendar
  }
  btn.addEventListener('click',doCalendar);
  btn.addEventListener('touchend',function(e){e.preventDefault();doCalendar(e);},{passive:false});
  rowEl.appendChild(btn);
}

function stripDiacritics(s){
  return (s||'').replace(/[ăâ]/g,'a').replace(/[ÂÄ]/g,'A').replace(/[Ă]/g,'A')
    .replace(/î/g,'i').replace(/Î/g,'I')
    .replace(/[șş]/g,'s').replace(/[ȘŞ]/g,'S')
    .replace(/[țţ]/g,'t').replace(/[ȚŢ]/g,'T')
    .replace(/é/g,'e').replace(/É/g,'E')

// Descarcă un blob — încearcă File System Access API (overwrite real), fallback la <a download>
// fileHandles păstrează handleurile per nume de fișier pentru sesiunea curentă
// forceNew=true → ignoră handle salvat, deschide dialog (pentru "scrie peste" explicit)
var _fsHandles={};
async function dlBlob(content, filename, mime, forceNew){
  var blob=new Blob([content],{type:mime||'application/json'});
  // Încearcă File System Access API (Chrome desktop + Android Chrome 86+)
  if(window.showSaveFilePicker){
    try{
      var handle=forceNew?null:_fsHandles[filename];
      if(!handle){
        var ext=filename.split('.').pop().toLowerCase();
        var typeMap={json:{description:'JSON',accept:{'application/json':['.json']}},txt:{description:'Text',accept:{'text/plain':['.txt']}}};
        handle=await window.showSaveFilePicker({
          suggestedName:filename,
          types:[typeMap[ext]||{description:'File',accept:{'application/octet-stream':['.*']}}]
        });
        _fsHandles[filename]=handle;
      }
      var writable=await handle.createWritable();
      await writable.write(blob);
      await writable.close();
      return;
    }catch(err){
      if(err.name==='AbortError') return;
      delete _fsHandles[filename];
    }
  }
  // Fallback clasic
  var u=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=u;a.download=filename;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(u);},1000);
}

    if(e.kind==='task-create') line='['+ds+'] TASK NOU: '+e.taskName+' > '+(CN2[e.colId]||e.colId);
    else if(e.kind==='task-move') line='['+ds+'] MUTARE: '+e.taskName+': '+(CN2[e.fromCol]||e.fromCol)+' > '+(CN2[e.toCol]||e.toCol);
    else if(e.kind==='free-task-create') line='['+ds+'] NEXT LIBER: '+e.taskName;
    else if(e.kind==='free-task-delete') line='['+ds+'] STERS NEXT: '+e.taskName;
    else if(e.kind==='project-create') line='['+ds+'] PROIECT NOU: '+e.projectName;
    else if(e.kind==='project-archive') line='['+ds+'] ARHIVAT: '+e.projectName;
    else line='['+ds+'] '+e.kind+': '+(e.taskName||e.projectName||'');
    lines.push(stripDiacritics(line));
  });
  var fname=withDate?'jurnal-'+todayStr()+'.txt':'jurnal.txt';
  // withDate=false (fișier fix) → dacă avem deja handle, forțează dialog nou (overwrite explicit)
  var forceNew=(!withDate && !!_fsHandles[fname]);
  if(forceNew) delete _fsHandles[fname];
  dlBlob(lines.join('\n'), fname,'text/plain');
}

// ── Import jurnal Clipboard JSON ──
function doImpShareJournal(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){
    try{
      var p=JSON.parse(ev.target.result);
      if(p.shareJournal&&Array.isArray(p.shareJournal)){
        S.shareJournal=p.shareJournal;lw(SHJK,S.shareJournal);
        alert('✓ Clipboard jurnal importat: '+p.shareJournal.length+' intrari.');render();
      } else throw 0;
    }catch(_){alert('❌ Invalid file.');}
  };
  r.readAsText(f);e.target.value='';
}
// ── Export jurnal Clipboard .txt (fără diacritice) ──
function doExpShareJournalTxt(withDate){
  var lines=S.shareJournal.map(function(e){
    var d=new Date(e.ts);
    var ds=d.toLocaleDateString('ro-RO')+' '+d.toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'});
    var prefix=e.kind==='share-receive'?'PRIMIT':e.kind==='share-delete'?'STERS':e.kind==='share-merge'?'MERGE':'LOG';
    var body=e.text||'';
    return stripDiacritics('['+ds+'] ['+prefix+']\n'+body);
  });
  if(!lines.length){alert('Jurnalul Clipboard e gol.');return;}
  var fname=withDate?'sharejurnal-'+todayStr()+'.txt':'sharejurnal.txt';
  if(!withDate && _fsHandles[fname]) delete _fsHandles[fname];
  dlBlob(lines.join('\n\n'), fname,'text/plain');
}
// ── Import jurnal Clipboard .txt (legacy) ──
function doImpShareJournalTxt(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){
    var txt=ev.target.result||'';
    var blocks=txt.split(/\n(?=\[)/);
    var entries=[];
    blocks.forEach(function(block){
      var m=block.match(/^\[([^\]]+)\]\n([\s\S]+)/);
      if(m) entries.push({ts:new Date(m[1]).getTime()||Date.now(),text:m[2].trim()});
    });
    S.shareJournal=entries;lw(SHJK,S.shareJournal);
    alert('✓ Clipboard jurnal importat (txt): '+entries.length+' intrari.');render();
  };
  r.readAsText(f);e.target.value='';
}

// ── Helpers ──
function mk(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}
function div(cls){return mk('div',cls);}
function sp(cls,txt){const s=mk('span',cls);if(txt!=null)s.textContent=txt;return s;}
function bt(cls,txt,fn){const b=mk('button','btn '+cls);b.textContent=txt;b.addEventListener('click',fn);return b;}
function ip(cls,ph,val,onI,onK){const i=mk('input',cls);i.placeholder=ph||'';i.value=val||'';if(onI)i.addEventListener('input',onI);if(onK)i.addEventListener('keydown',onK);return i;}
function ap(el,...kids){
  kids.forEach(k=>{
    if(k==null||k===false||k===undefined)return;
    if(Array.isArray(k)){k.forEach(x=>{if(x!=null)el.appendChild(typeof x==='string'?document.createTextNode(x):x);});return;}
    el.appendChild(typeof k==='string'?document.createTextNode(k):k);
  });
  return el;
}

  var bSave=document.createElement('button');
  bSave.textContent='✓ Save';
  bSave.style.cssText='flex:1;background:#F59E0B;color:#1A1D2E;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:800;cursor:pointer;touch-action:manipulation';

  function doSave(){
    saveFn(ta.value); // poate fi gol — ștergere notă
    document.body.removeChild(ov);
  }
  function doCancel(){document.body.removeChild(ov);}

  bSave.addEventListener('click',doSave);
  bSave.addEventListener('touchend',function(e){e.preventDefault();doSave();},{passive:false});
  bCancel.addEventListener('click',doCancel);
  bCancel.addEventListener('touchend',function(e){e.preventDefault();doCancel();},{passive:false});

  // Tap pe fundal → cancel
  ov.addEventListener('click',function(e){if(e.target===ov)doCancel();});
  ov.addEventListener('touchend',function(e){if(e.target===ov){e.preventDefault();doCancel();}},{passive:false});

  btns.appendChild(bSave);btns.appendChild(bCancel);
  card.appendChild(titleEl);card.appendChild(ta);card.appendChild(btns);

  document.body.appendChild(ov);
  setTimeout(function(){ta.focus();var l=ta.value.length;ta.setSelectionRange(l,l);},80);
}

            row.appendChild(inp);
            // Cursor la sfârșit, fără selecție forțată (select() blochează tastatura Android)
            inp.focus();
            var len=inp.value.length;
            inp.setSelectionRange(len,len);
            var blurTimer=null;
            function commitEdit(){

                res.tn=v;

                res.name=v;
              } else if(res.k==='sh'){

                if(st){st.name=v;st.modifiedTs=Date.now();lw(SHK,S.shareTasks);}
                res.name=v;

              if(editDone) return;
              editDone=true;
              inEditMode=false;
              clearTimeout(blurTimer);
              if(doCommit) commitEdit(); else render();
            }
            inp.addEventListener('keydown',function(e){
              if(e.key==='Enter'){e.preventDefault();finishEdit(true);}

// ── Mută taskurile selectate la început sau la final în NEXT ──
function moveSelectedNext(where){
  var nr=getNR();
  var selKeys=Object.keys(S.selectedNext); // chei: 'f::id' sau 'p::pid::tid'
  if(!selKeys.length) return;
  // Construiește lista unificată curentă
  var unified=nr.map(function(r){
    return r.isFree?{type:'free',id:r.id}:{type:'proj',projectId:r.projectId,taskId:r.taskId};
  });
  function rowKey(r){return r.type==='free'?'f::'+r.id:'p::'+r.projectId+'::'+r.taskId;}
  var selSet=new Set(selKeys);
  var selected=unified.filter(function(r){return selSet.has(rowKey(r));});
  var rest=unified.filter(function(r){return !selSet.has(rowKey(r));});
  var newOrder;
  if(where==='top'){
    // Selectate la început, în ordinea în care erau; restul după
    newOrder=selected.concat(rest);
  } else {
    // Selectate la final, în ordinea în care erau; restul înaintea lor
    newOrder=rest.concat(selected);
  }
  S.nextOrder=newOrder;
  // Reordonează și freeTasks să coincidă
  var newFT=[];
  newOrder.forEach(function(x){
    if(x.type==='free'){var f=S.freeTasks.find(function(ft){return ft.id===x.id;});if(f)newFT.push(f);}
  });
  S.freeTasks.forEach(function(f){if(!newFT.find(function(x){return x.id===f.id;}))newFT.push(f);});
  S.freeTasks=newFT;
  lw(NK,S.nextOrder);lw(FK,S.freeTasks);
  S.selectedNext={};S.selectMode=false;
  render();
}

function render(){
  const app=document.getElementById('app');app.innerHTML='';
  app.appendChild(
    S.view==='journal'?rJournal():
    S.view==='clipjournal'?rClipJournal():
    S.view==='data'?rData():
    rBoard()
  );
}

    overlay.style.display='none';
    inp.value='';
  }
  function commitFab(){
    var name=inp.value.trim();
    if(!name){closeFab();return;}
    var ft={id:gid(),name:name,ts:Date.now(),modifiedTs:Date.now()};
    je({kind:'free-task-create',taskName:name,ts:ft.ts});
    S.freeTasks=[...S.freeTasks,ft];
    // unshift — adaugă la ÎNCEPUTUL next
    S.nextOrder=[{type:'free',id:ft.id},...S.nextOrder];
    lw(FK,S.freeTasks);lw(NK,S.nextOrder);
    lw('pb-local-dirty-ts',Date.now());
    closeFab();
    render();
    // scroll la primul element din next
    setTimeout(function(){
      var el=document.querySelector('.nrow');
      if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
    },80);
  }

  fabBtn.addEventListener('click',openFab);
  fabBtn.addEventListener('touchend',function(e){e.preventDefault();openFab();},{passive:false});
  okBtn.addEventListener('click',commitFab);
  okBtn.addEventListener('touchend',function(e){e.preventDefault();commitFab();},{passive:false});
  cancelBtn.addEventListener('click',closeFab);
  cancelBtn.addEventListener('touchend',function(e){e.preventDefault();closeFab();},{passive:false});
  inp.addEventListener('keydown',function(e){
    if(e.key==='Enter'){e.preventDefault();commitFab();}
    if(e.key==='Escape'){closeFab();}
  });
  // click pe fundal închide
  overlay.addEventListener('click',function(e){if(e.target===overlay)closeFab();});
  overlay.addEventListener('touchend',function(e){if(e.target===overlay){e.preventDefault();closeFab();}},{passive:false});
})();

// ── Extrage textul afișabil dintr-un task (titlu + url dacă există) ──
function getTaskDisplayText(tname){
  var parts=tname.split('\n');
  var title=parts.find(function(l){return !l.match(/^https?:\/\//);})||parts[0]||'';
  var url=parts.find(function(l){return l.match(/^https?:\/\//);})||'';
  var text=title.trim();
  if(url) text=text+(text?' — ':'')+url.trim();
  return text;
}

// ── Calculează șirurile merge conform algoritmului ──
// Fiecare rând bifat = START al unui șir
// Șirul include rândul marcat + toate rândurile ANTERIOARE (în sus)
// până la rândul marcat anterior sau marginea de sus a listei Next
// Rezultat: array de array-uri de texte (fiecare sub-array = un șir merge)
function calcMergeGroups(){
  // Operează pe shareTasks în ordinea afișată (0=sus=cel mai recent)
  var rows=S.shareTasks.map(function(item){
    return {
      rk: 's:'+item.id,
      text: getTaskDisplayText(item.name),
      id: item.id
    };
  });
  var markedIdx=[];
  rows.forEach(function(r,i){if(S.mergeFlags[r.rk]) markedIdx.push(i);});
  if(!markedIdx.length) return [];
  var groups=[];
  for(var g=0;g<markedIdx.length;g++){
    var end=markedIdx[g];
    var start=g===0?0:markedIdx[g-1]+1;
    var groupRows=rows.slice(start,end+1);
    // Ordinea inversă: marcat primul (cel mai recent), apoi urcăm
    var texts=groupRows.slice().reverse().map(function(r){return r.text;}).filter(Boolean);
    if(texts.length) groups.push({texts:texts, ids:groupRows.map(function(r){return r.id;})});
  }
  return groups;
}

// ── Merge: clipboard + acumulare în localStorage ──
function doMerge(){
  var groups=calcMergeGroups();
  if(!groups.length) return;
  var SEP='\n* ';
  var allLines=[];
  groups.forEach(function(g){allLines=allLines.concat(g.texts);});
  // Format /c: prefix pe primul rând, apoi lista cu *
  var result='/c\n* '+allLines.join(SEP);

  // 1. Clipboard
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(result).catch(function(){});
  } else {
    var ta=document.createElement('textarea');
    ta.value=result;ta.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');}catch(_){}
    document.body.removeChild(ta);
  }

  // 2. Append la log intern + shareJournal
  var existing=localStorage.getItem(CK)||'';
  var newLog=existing+(existing?'\n':'')+result;
  localStorage.setItem(CK,newLog);
  // Jurnal Share — kind:'share-merge'
  S.shareJournal.push({ts:Date.now(),kind:'share-merge',text:result});
  lw(SHJK,S.shareJournal);

  var total=allLines.length;
  var toast=document.createElement('div');
  toast.textContent='✓ '+total+' item'+(total>1?'s':'')+' copiat'+(total>1?'e':'')+' în clipboard';
  toast.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1A1D2E;color:#10B981;border:1px solid #10B981;border-radius:9px;padding:9px 18px;font-size:12px;font-weight:700;z-index:9999;pointer-events:none;white-space:nowrap';
  document.body.appendChild(toast);
  setTimeout(function(){if(toast.parentNode)toast.parentNode.removeChild(toast);},2500);
}

// ── Descarcă tot istoricul clipboard acumulat (legacy — folosit din bara merge) ──

// ── Șterge din Share itemurile merguite, lasă rezultatul concatenat ──
function doMergeDelete(){
  var groups=calcMergeGroups();
  if(!groups.length) return;
  var SEP='\n* ';
  // Construiește rezultatul merge (același ca doMerge)
  var allLines=[];
  groups.forEach(function(g){allLines=allLines.concat(g.texts);});
  var mergedText='/c\n* '+allLines.join(SEP);
  // Colectează toate ID-urile din toate grupurile
  var allIds=[];
  groups.forEach(function(g){allIds=allIds.concat(g.ids);});
  // Șterge itemurile originale din Share
  allIds.forEach(function(sid){
    var item=S.shareTasks.find(function(x){return x.id===sid;});
    if(item){
      S.shareJournal.push({ts:Date.now(),kind:'share-delete',text:item.name});
    }
    S.shareTasks=S.shareTasks.filter(function(x){return x.id!==sid;});
    delete S.mergeFlags['s:'+sid];
  });
  lw(SHJK,S.shareJournal);
  // A2: adaugă rezultatul concatenat ca item nou în Share (sus)
  var newItem={id:gid(),name:mergedText,ts:Date.now()};
  S.shareTasks=[newItem,...S.shareTasks];
  lw(SHK,S.shareTasks);lw(MK,S.mergeFlags);
  render();
}

// ── Extragere metadate cu fallback cascadă ──
// 1. microlink.io → 2. jsonlink.io → 3. noembed (YouTube/etc) → 4. popup manual
function fetchMetaWithFallback(urlToFetch, shareTitle, cb){
  function buildText(t, desc){
    t=(t||'').trim(); desc=(desc||'').trim();
    var parts=[];
    if(t) parts.push(t);
    if(desc&&desc!==t) parts.push(desc);
    return parts.length ? parts.join(' — ')+'\n'+urlToFetch : null;
  }
  var isYouTube=/youtube\.com|youtu\.be/i.test(urlToFetch);
  // 1. microlink.io — sare peste YouTube (returnează mereu description generică)
  var p1 = isYouTube
    ? Promise.reject(new Error('skip youtube'))
    : fetch('https://api.microlink.io/?url='+encodeURIComponent(urlToFetch))
        .then(function(r){return r.json();})
        .then(function(d){
          if(d&&d.status==='success'&&d.data){
            var result=buildText(d.data.title, d.data.description);
            if(result) return result;
          }
          throw new Error('no data');
        });
  p1.catch(function(){
    // 2. noembed.com — excelent pentru YouTube, Vimeo, Twitter etc
    return fetch('https://noembed.com/embed?url='+encodeURIComponent(urlToFetch))
      .then(function(r){return r.json();})
      .then(function(d){
        if(d&&d.title&&d.title.trim()&&d.title!=='YouTube'){
          var author=(d.author_name||'').trim();
          var t=d.title.trim();
          var result=(author?t+' · '+author:t)+'\n'+urlToFetch;
          return result;
        }
        throw new Error('no data');
      });
  }).then(function(result){
    cb(result);
  }).catch(function(){
    // 3. jsonlink.io
    fetch('https://jsonlink.io/api/extract?url='+encodeURIComponent(urlToFetch))
      .then(function(r){return r.json();})
      .then(function(d){
        var result=buildText(d&&d.title, d&&d.description);
        if(result){cb(result);return;}
        throw new Error('no data');
      })
      .catch(function(){
        // Fallback silențios — salvează URL-ul direct, fără popup
        cb((shareTitle?shareTitle+' — ':'')+urlToFetch);
      });
  });
}

// ── Service Worker + Share Target ──
function addToNext(taskText){
  if(!taskText||!taskText.trim())return;
  var ft={id:gid(),name:taskText.trim(),ts:Date.now()};
  je({kind:'free-task-create',taskName:ft.name,ts:ft.ts});
  S.freeTasks=[...S.freeTasks,ft];
  S.nextOrder=[{type:'free',id:ft.id},...S.nextOrder];
  lw(FK,S.freeTasks);lw(NK,S.nextOrder);
  render();
}

// Tot ce vine prin Share Target merge în secțiunea SHARE, nu în Next
function addToShare(taskText){
  if(!taskText||!taskText.trim())return;
  var st={id:gid(),name:taskText.trim(),ts:Date.now()};
  // share-receive → NUMAI în shareJournal, NU în jurnalul principal
  S.shareJournal.push({ts:st.ts,kind:'share-receive',text:st.name});
  lw(SHJK,S.shareJournal);
  S.shareTasks=[st,...S.shareTasks];
  lw(SHK,S.shareTasks);
  render();
}

function handleIncomingShare(){
  var url=new URL(window.location.href);
  var text=url.searchParams.get('addnext')||'';
  var title=url.searchParams.get('addtitle')||'';
  var sharedUrl=url.searchParams.get('addurl')||'';

  if(!text&&!title&&!sharedUrl) return; // nimic de procesat

  history.replaceState({},'',window.location.pathname);

  function afterShare(taskText){
    addToShare(taskText);
    // Închide aplicația după share — revine la aplicația sursă
    setTimeout(function(){window.close();},300);
  }

  var urlToFetch=sharedUrl||(text&&text.match(/^https?:\/\//)?text:'');
  if(urlToFetch){
    fetchMetaWithFallback(urlToFetch, title, function(taskText){
      afterShare(taskText);
    });
    return;
  }

  var taskText=text||title||'';
  afterShare(taskText);
}

function registerSW(){
  if(!('serviceWorker' in navigator)) return;
  // Nu înregistra SW în artifact Claude sau pe file://
  var host = window.location.hostname;
  if(host === 'www.claudeusercontent.com' || host === '') return;
  navigator.serviceWorker.register('sw.js').then(function(reg){
    console.log('SW înregistrat:', reg.scope);
  }).catch(function(err){
    console.log('SW eroare:', err);
  });
  // Ascultă mesaje de la SW (share când app era deschisă)
  navigator.serviceWorker.addEventListener('message',function(e){
    if(e.data&&e.data.type==='ADD_NEXT'&&e.data.text){
      addToShare(e.data.text.trim());
    }
  });
  // Verifică dacă există share pending (app era închisă)
  caches.open('projectboard-v44').then(function(cache){
    cache.match('/__pending_share__').then(function(resp){
      if(!resp)return;
      resp.text().then(function(text){
        if(!text)return;
        cache.delete('/__pending_share__');
        addToShare(text.trim());
      });
    });
  }).catch(function(){});
}
