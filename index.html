<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<link rel="manifest" href="manifest.json"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#1A1D2E"/>
<title>Project Board V36</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans','Segoe UI',sans-serif;background:#F7F8FA;-webkit-tap-highlight-color:transparent;overflow-x:hidden}
input{font-family:inherit;outline:none}

/* ── Header ── */
.hdr{background:#1A1D2E;color:#fff;padding:11px 13px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;gap:6px;flex-wrap:wrap}
.hdr-l{display:flex;align-items:center;gap:9px}
.hdr-r{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.logo{font-size:22px;color:#F59E0B}
.h1{font-size:15px;font-weight:700}
.h2{font-size:10px;color:#9CA3AF;margin-top:1px}
.btn{border:none;border-radius:7px;padding:6px 9px;font-weight:700;font-size:11px;cursor:pointer}
.bg{background:#374151;color:#fff}
.bp{background:#8B5CF6;color:#fff}
.bi{background:#6366F1;color:#fff}
.ba{background:#F59E0B;color:#1A1D2E}
.bgr{background:#10B981;color:#fff}
.sdot{font-size:10px;font-weight:600;min-width:12px}

/* ── Section divider ── */
.sdiv{display:flex;align-items:center;gap:10px;padding:9px 14px;background:#1A1D2E}
.sline{flex:1;height:2px;background:repeating-linear-gradient(90deg,#374151 0,#374151 5px,transparent 5px,transparent 9px)}
.stxt{font-size:12px;font-weight:800;color:#F1F5F9;letter-spacing:.18em;white-space:nowrap}

/* ── NEXT section ── */
.nrow{display:flex;align-items:center;gap:7px;padding:7px 10px;border-bottom:1px solid #E5E7EB;background:#fff}
.ndot{width:8px;height:8px;border-radius:50%;background:#F59E0B;flex-shrink:0;pointer-events:none}
.nproj{font-size:12px;font-weight:700;color:#1E293B;flex-shrink:0;max-width:88px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;pointer-events:none}
.narr{font-size:10px;color:#94A3B8;flex-shrink:0;pointer-events:none}
.ntask{font-size:12px;color:#374151;flex:1;line-height:1.4;word-break:break-word;pointer-events:auto;cursor:pointer}
.ndel{background:none;border:none;color:#D1D5DB;cursor:pointer;font-size:11px;padding:4px;flex-shrink:0}
.nadd-bar{padding:6px 10px;border-bottom:1px solid #E5E7EB;background:#FAFAFA}
.nadd-inp{border:1px solid #F59E0B;border-radius:6px;padding:5px 8px;font-size:12px;flex:1;max-width:240px}
.nadd-btn{background:none;border:1px dashed #F59E0B;border-radius:6px;padding:4px 10px;font-size:11px;color:#F59E0B;font-weight:700;cursor:pointer}
/* ── Share section ── */
.srow-share{display:flex;align-items:center;gap:7px;padding:7px 10px;border-bottom:1px solid #E5E7EB;background:#F0FDF4}
.sdot-share{width:8px;height:8px;border-radius:50%;background:#10B981;flex-shrink:0}
.share-to-next{background:#10B981;color:#fff;border:none;border-radius:6px;padding:5px 9px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0;touch-action:manipulation;min-width:44px;min-height:32px}
/* ── Merge toggle (div, nu input — fiabil pe Android) ── */
.nmerge{width:20px;height:20px;border:2px solid #D1D5DB;border-radius:5px;background:#fff;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:transparent;transition:background .15s,border-color .15s;touch-action:manipulation;user-select:none;-webkit-user-select:none}
.nmerge.on{background:#F59E0B;border-color:#F59E0B;color:#1A1D2E}
/* ── Merge bar ── */
.merge-bar{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#FFF8EC;border-bottom:2px solid #F59E0B}
.merge-count{font-size:11px;font-weight:700;color:#92400E}
.merge-btn{background:#F59E0B;color:#1A1D2E;border:none;border-radius:7px;padding:6px 13px;font-size:12px;font-weight:800;cursor:pointer;touch-action:manipulation}
.merge-clear{background:#374151;color:#9CA3AF;border:none;border-radius:7px;padding:6px 10px;font-size:11px;cursor:pointer;touch-action:manipulation}

/* ── Col headers ── */
.chdr{display:grid;grid-template-columns:110px 1fr 1fr 1fr;background:#1A1D2E;border-bottom:1px solid #2D3048;position:sticky;top:50px;z-index:100}
.chdr-p{padding:7px 8px;font-size:9px;font-weight:700;color:#9CA3AF;letter-spacing:.1em}
.chdr-c{padding:7px 6px;display:flex;align-items:center;gap:4px}
.chdr-lbl{font-size:10px;font-weight:700;letter-spacing:.04em}
.chdr-cnt{margin-left:auto;border-radius:99px;font-size:9px;font-weight:700;padding:1px 5px;color:#fff}

/* ── Add bar ── */
.abar{display:flex;gap:7px;align-items:center;padding:8px 11px;border-bottom:1px solid #E5E7EB}
.abar input{flex:1;border:1px solid #3B82F6;border-radius:7px;padding:7px 10px;font-size:13px;max-width:270px}
.abar.sec{background:#F5F3FF}.abar.sec input{border-color:#6366F1}
.abar.proj{background:#EFF6FF}

/* ── Section row ── */
.srow{display:flex;align-items:center;justify-content:center;padding:12px 18px;background:#F0EDFF;border-bottom:1px solid #DDD6FE;border-top:1px solid #DDD6FE;position:relative;transition:background .12s}
.srow.dov{background:#EDE9FE;box-shadow:inset 0 0 0 2px #6366F1}
.srow.drg{opacity:.3}
.sname{font-size:13px;font-weight:700;color:#4338CA;letter-spacing:.02em}
.shandle{font-size:17px;color:#A5B4FC;cursor:grab;touch-action:none;user-select:none;position:absolute;left:11px}
.sdel{background:none;border:none;color:#C4B5FD;cursor:pointer;font-size:11px;position:absolute;right:11px;padding:4px}

/* ── Project row ── */
.prow{display:grid;grid-template-columns:110px 1fr 1fr 1fr;border-bottom:1px solid #E5E7EB;background:#fff;min-height:58px;transition:background .12s,opacity .12s}
.prow.dov{background:#EEF2FF;box-shadow:inset 0 0 0 2px #6366F1}
.prow.drg{opacity:.3}
.pnc{display:flex;align-items:flex-start;gap:4px;padding:8px 5px;border-right:1px solid #F3F4F6}
.phandle{font-size:17px;color:#CBD5E1;cursor:grab;flex-shrink:0;touch-action:none;user-select:none;padding:1px 2px}
.pname{font-size:12px;font-weight:600;color:#1A1D2E;flex:1;line-height:1.4;word-break:break-word}
.pdel{background:none;border:none;color:#D1D5DB;cursor:pointer;font-size:11px;padding:2px;flex-shrink:0}

/* ── Task cell ── */
.tcell{padding:5px 4px 4px;display:flex;flex-direction:column;gap:4px;border-right:1px solid #F3F4F6;transition:background .12s}
.tcell.don{outline:2px dashed currentColor;outline-offset:-2px;border-radius:4px}
.tcard{background:#F9FAFB;border-top:1px solid #E5E7EB;border-right:1px solid #E5E7EB;border-bottom:1px solid #E5E7EB;border-radius:6px;padding:5px 5px;display:flex;align-items:center;gap:4px;touch-action:none;transition:opacity .12s}
.tcard.drg{opacity:.3}
.tname{font-size:11px;color:#374151;flex:1;line-height:1.4;word-break:break-word}
.tdel{background:none;border:none;color:#D1D5DB;cursor:pointer;font-size:10px;padding:3px 4px;flex-shrink:0}
.atw{display:flex;gap:3px;align-items:center}
.ati{border:1px dashed #D1D5DB;border-radius:5px;padding:3px 4px;font-size:10px;color:#9CA3AF;background:transparent;flex:1;min-width:0;width:0}
.atb{background:#E5E7EB;border:none;border-radius:4px;width:20px;height:20px;font-size:13px;color:#6B7280;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;padding:0}

/* ── Edit input ── */
.einp{border:1px solid #6366F1;border-radius:4px;padding:2px 5px;font-size:12px;width:100%}

/* ── Ghost ── */
#ghost{position:fixed;background:#1A1D2E;color:#fff;padding:7px 13px;border-radius:8px;font-size:12px;font-weight:700;pointer-events:none;z-index:9999;opacity:.93;box-shadow:0 8px 24px rgba(0,0,0,.3);max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transform:rotate(-2deg);display:none}

/* ── Journal ── */
.je{border-bottom:1px solid #E5E7EB;padding:8px 13px}
.jdate{font-size:10px;color:#9CA3AF;margin-left:5px}
.jtask{font-size:12px;color:#374151;padding:2px 0 2px 12px}
.jmove{font-size:11px;color:#6B7280;padding:2px 0 2px 12px;font-style:italic}
.sw{display:flex;align-items:center;background:#2D3348;border-radius:6px;padding:2px 6px;gap:3px}
.si{background:transparent;border:none;color:#fff;font-size:12px;width:100px;outline:none}
.si::placeholder{color:#6B7280}
.sbtn{background:none;border:none;color:#9CA3AF;cursor:pointer;font-size:13px;padding:1px 3px}
.srp{background:#fff}
.srp-h{padding:7px 13px;background:#1E2130;color:#9CA3AF;font-size:11px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.sri{padding:8px 13px;border-bottom:1px solid #F3F4F6;display:flex;align-items:center;gap:7px;font-size:12px}
.sbg{font-size:9px;font-weight:700;border-radius:3px;padding:1px 5px;flex-shrink:0}
#top-btn{position:fixed;bottom:22px;right:16px;z-index:500;background:#1A1D2E;color:#F59E0B;border:2px solid #F59E0B;border-radius:50%;width:46px;height:46px;font-size:20px;font-weight:700;cursor:pointer;touch-action:manipulation;box-shadow:0 4px 14px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;line-height:1}
</style>
</head>
<body>
<div id="ghost"></div>
<div id="app"></div>
<button id="top-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
<script>
'use strict';
const VERSION=(document.title.match(/V(\d+)/)||['','?'])[0]||'V36';
const COLS=[{id:'next',label:'To Do',color:'#F59E0B',bg:'#FFF8EC',icon:'📋'},{id:'wait',label:'Wait',color:'#6366F1',bg:'#F0F0FF',icon:'⏳'},{id:'done',label:'Done',color:'#10B981',bg:'#ECFDF5',icon:'✅'}];
const CN={next:'To Do',wait:'Wait',done:'Done'};
const SK='pb-data-v2',JK='pb-journal-v1',NK='pb-next-v1',FK='pb-free-v1',WK='pb-wait-order-v1',WFK='pb-wait-free-v1',MK='pb-merge-v1',CK='pb-cliplog-v1',SHK='pb-share-v1',LBLK='pb-labels-v1',SHJK='pb-sharejour-v1';
const DEF=[
  {type:'project',id:'id_demo_p1',name:'Renovare baie',tasks:[
    {id:'id_demo_t1',name:'Cumpărat gresie și adeziv de la Dedeman',status:'next',weight:3},
    {id:'id_demo_t2',name:'Plătit factura instalator',status:'done'}
  ]},
  {type:'project',id:'id_demo_p2',name:'Pregătire vacanță',tasks:[
    {id:'id_demo_t3',name:'Rezervat hotel Mamaia pentru 10–17 august',status:'next'},
    {id:'id_demo_t4',name:'*Reînnoit asigurare medicală de călătorie',status:'next'}
  ]},
];

// ── State ──
let S={items:[],journal:[],nextOrder:[],freeTasks:[],waitOrder:[],waitFreeTasks:[],shareTasks:[],shareJournal:[],mergeFlags:{},labels:['#a','#u','#c'],view:'board',editId:null,editTid:null,showAdd:null,addName:'',nt:{},nfree:'',showFree:false,wfree:'',showWFree:false,sq:'',sr:null,showClip:false,showSettings:false};
function ls(k){try{const r=localStorage.getItem(k);return r?JSON.parse(r):null;}catch(_){return null;}}
function lw(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(_){}}
function gid(){return 'id_'+Math.random().toString(36).substr(2,9);}
function fmt(ts){const d=new Date(ts);return d.toLocaleDateString('ro-RO',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+d.toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'});}
const DEF_FREE=[
  {id:'id_demo_f1',name:'Cumpărat pâine și lapte',ts:Date.now()-120000},
  {id:'id_demo_f2',name:'Sunat medicul pentru programare',ts:Date.now()-60000}
];
const DEF_SHARE=[
  {id:'id_demo_s1',name:'Getting Things Done — metodă de organizare a sarcinilor și proiectelor\nhttps://en.wikipedia.org/wiki/Getting_things_done',ts:Date.now()-180000},
  {id:'id_demo_s2',name:'Metoda Kanban — sistem vizual de gestionare a fluxului de lucru\nhttps://en.wikipedia.org/wiki/Kanban_(development)',ts:Date.now()-90000}
];
function init(){
  const s=ls(SK);S.items=(s&&Array.isArray(s)&&s.length)?s:JSON.parse(JSON.stringify(DEF));
  S.journal=ls(JK)||[];
  const storedFree=ls(FK);
  S.freeTasks=(storedFree&&storedFree.length)?storedFree:JSON.parse(JSON.stringify(DEF_FREE));
  const storedNK=ls(NK);
  S.nextOrder=storedNK?storedNK:(S.freeTasks.map(function(f){return {type:'free',id:f.id};}));
  S.waitOrder=ls(WK)||[];S.waitFreeTasks=ls(WFK)||[];S.mergeFlags=ls(MK)||{};
  const storedShare=ls(SHK);
  S.shareTasks=(storedShare&&storedShare.length)?storedShare:JSON.parse(JSON.stringify(DEF_SHARE));
  S.labels=ls(LBLK)||['#a','#u','#c'];S.shareJournal=ls(SHJK)||[];
}
let saveT=null;
function save(){clearTimeout(saveT);saveT=setTimeout(()=>{lw(SK,S.items);const d=document.getElementById('sdot');if(d){d.textContent='✓';d.style.color='#10B981';setTimeout(()=>d.textContent='',2000);}},400);}
function saveAll(){lw(SK,S.items);lw(JK,S.journal);lw(NK,S.nextOrder);lw(FK,S.freeTasks);lw(WK,S.waitOrder);lw(WFK,S.waitFreeTasks);lw(MK,S.mergeFlags);lw(SHK,S.shareTasks);lw(LBLK,S.labels);lw(SHJK,S.shareJournal);}
function je(e){S.journal.push(e);lw(JK,S.journal);}

// ── Next rows ──
// nextOrder stochează: {type:'proj',projectId,taskId} sau {type:'free',id}
// Logica selecție din To Do → NEXT:
//   - dacă proiectul are un singur task în To Do → apare automat în NEXT
//   - dacă are mai multe → doar cele care încep cu '*' apar în NEXT
//   - în NEXT numele apare fără asterisk
function getEligibleTodoPairs() {
  const pairs = [];
  S.items.forEach(it => {
    if (it.type !== 'project') return;
    const todos = (it.tasks || []).filter(t => t.status === 'next');
    if (todos.length === 0) return;
    if (todos.length === 1) {
      // Singurul task → eligibil automat
      pairs.push({ projectId: it.id, taskId: todos[0].id, warn: false });
    } else {
      const starred = todos.filter(t => t.name.startsWith('*'));
      if (starred.length > 0) {
        // Există * → doar cele cu *
        starred.forEach(t => pairs.push({ projectId: it.id, taskId: t.id, warn: false }));
      } else {
        // Niciun * → toate apar cu avertisment
        todos.forEach(t => pairs.push({ projectId: it.id, taskId: t.id, warn: true }));
      }
    }
  });
  return pairs;
}

function getNR(){
  const eligibleProj = getEligibleTodoPairs();
  const allFree = S.freeTasks.map(f => ({ type: 'free', id: f.id }));

  const projKeys = new Set(eligibleProj.map(x => x.projectId + '::' + x.taskId));
  const freeKeys = new Set(allFree.map(x => x.id));

  // Filtrăm nextOrder — păstrăm doar ce e eligibil și există încă
  const clean = S.nextOrder.filter(x => {
    if (x.type === 'free') return freeKeys.has(x.id);
    return projKeys.has((x.projectId || '') + '::' + (x.taskId || ''));
  });

  // Adăugăm la final ce e eligibil dar nu e încă în ordine
  const inOrder = new Set(clean.map(x => x.type === 'free' ? 'f::' + x.id : (x.projectId + '::' + x.taskId)));
  const newProj = eligibleProj.filter(x => !inOrder.has(x.projectId + '::' + x.taskId))
    .map(x => ({ type: 'proj', projectId: x.projectId, taskId: x.taskId }));
  const newFree = allFree.filter(x => !inOrder.has('f::' + x.id));
  const unified = [...clean, ...newProj, ...newFree];

  // Map warn pe unified din eligibleProj
  const warnMap = new Map(eligibleProj.map(x => [x.projectId + '::' + x.taskId, x.warn]));

  // Mapăm la rows — eliminăm * din nume la afișare
  return unified.map(x => {
    if (x.type === 'free') {
      const f = S.freeTasks.find(ft => ft.id === x.id);
      if (!f) return null;
      return { isFree: true, id: f.id, pname: '—', tname: f.name, warn: false };
    }
    const p = S.items.find(it => it.id === x.projectId);
    const t = p?.tasks?.find(t => t.id === x.taskId);
    if (!p || !t) return null;
    const displayName = t.name.startsWith('*') ? t.name.slice(1).trimStart() : t.name;
    const warn = warnMap.get(x.projectId + '::' + x.taskId) || false;
    return { isFree: false, projectId: x.projectId, taskId: x.taskId, pname: p.name, tname: displayName, warn };
  }).filter(Boolean);
}

// ── WAITING rows — toate task-urile cu status 'wait' ──────────
function getWR(){
  const allProj=[];
  S.items.forEach(it=>{
    if(it.type!=='project')return;
    (it.tasks||[]).forEach(t=>{if(t.status==='wait')allProj.push({type:'proj',projectId:it.id,taskId:t.id});});
  });
  const allFree=S.waitFreeTasks.map(f=>({type:'free',id:f.id}));
  const projKeys=new Set(allProj.map(x=>x.projectId+'::'+x.taskId));
  const freeKeys=new Set(allFree.map(x=>x.id));

  const clean=S.waitOrder.filter(x=>{
    if(x.type==='free')return freeKeys.has(x.id);
    return projKeys.has((x.projectId||'')+'::'+( x.taskId||''));
  });
  const inOrder=new Set(clean.map(x=>x.type==='free'?'f::'+x.id:(x.projectId+'::'+x.taskId)));
  const newProj=allProj.filter(x=>!inOrder.has(x.projectId+'::'+x.taskId));
  const newFree=allFree.filter(x=>!inOrder.has('f::'+x.id));
  const unified=[...clean,...newProj,...newFree];

  return unified.map(x=>{
    if(x.type==='free'){
      const f=S.waitFreeTasks.find(ft=>ft.id===x.id);
      if(!f)return null;
      return {isFree:true,id:f.id,pname:'—',tname:f.name};
    }
    const p=S.items.find(it=>it.id===x.projectId);
    const t=p?.tasks?.find(t=>t.id===x.taskId);
    if(!p||!t)return null;
    return {isFree:false,projectId:x.projectId,taskId:x.taskId,pname:p.name,tname:t.name};
  }).filter(Boolean);
}
const ghost=document.getElementById('ghost');
function sg(txt,x,y,col){ghost.textContent=txt;ghost.style.background=col||'#1A1D2E';ghost.style.left=x-24+'px';ghost.style.top=y-16+'px';ghost.style.display='block';}
function mg(x,y){ghost.style.left=x-24+'px';ghost.style.top=y-16+'px';}
function hg(){ghost.style.display='none';}

// ── Drag ──
let drag=null;
// Hit test using bounding rects — works reliably on Android
function hitCell(x,y){
  const cells=document.querySelectorAll('.tcell');
  for(let c of cells){const r=c.getBoundingClientRect();if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom)return c;}
  return null;
}
function hitRow(x,y,skip){
  const rows=document.querySelectorAll('[data-rid]');
  for(let r of rows){if(r.dataset.rid===skip)continue;const b=r.getBoundingClientRect();if(x>=b.left&&x<=b.right&&y>=b.top&&y<=b.bottom)return r;}
  return null;
}
function hitNextRow(x,y,skipIdx){
  const rows=document.querySelectorAll('[data-nidx]');
  for(let r of rows){if(parseInt(r.dataset.nidx)===skipIdx)continue;const b=r.getBoundingClientRect();if(x>=b.left&&x<=b.right&&y>=b.top&&y<=b.bottom)return r;}
  return null;
}
function hitWaitRow(x,y,skipIdx){
  const rows=document.querySelectorAll('[data-widx]');
  for(let r of rows){if(parseInt(r.dataset.widx)===skipIdx)continue;const b=r.getBoundingClientRect();if(x>=b.left&&x<=b.right&&y>=b.top&&y<=b.bottom)return r;}
  return null;
}
function clr(){
  document.querySelectorAll('.dov').forEach(e=>e.classList.remove('dov'));
  document.querySelectorAll('.tcell.don').forEach(e=>{e.classList.remove('don');e.style.background='';});
  document.querySelectorAll('.nrow.dov').forEach(e=>e.classList.remove('dov'));
}

document.addEventListener('touchmove',e=>{
  if(!drag)return;
  e.preventDefault();
  const t=e.touches[0];
  mg(t.clientX,t.clientY);
  clr();
  if(drag.type==='next'){
    const r=hitNextRow(t.clientX,t.clientY,drag.fromIdx);
    if(r)r.classList.add('dov');
    return;
  }
  if(drag.type==='wait'){
    const r=hitWaitRow(t.clientX,t.clientY,drag.fromIdx);
    if(r)r.classList.add('dov');
    return;
  }
  if(drag.type==='task'){
    const c=hitCell(t.clientX,t.clientY);
    if(c){c.classList.add('don');const col=COLS.find(x=>x.id===c.dataset.col);if(col){c.style.background=col.bg;c.style.outlineColor=col.color;}}
  } else {

document.addEventListener('touchend',()=>{
  if(!drag)return;
  hg();

  if(drag.type==='next'){
    const toEl=document.querySelector('.nrow.dov');
    if(toEl){
      const toIdx=parseInt(toEl.dataset.nidx);
      const fromIdx=drag.fromIdx;
      const nr=getNR();
      // Build unified key list
      const ordered=nr.map(r=>r.isFree?{type:'free',id:r.id}:{type:'proj',projectId:r.projectId,taskId:r.taskId});
      const [moved]=ordered.splice(fromIdx,1);
      ordered.splice(toIdx,0,moved);
      // Save unified order — also rebuild freeTasks order
      S.nextOrder=ordered;
      // Reorder freeTasks array to match new order
      const newFreeTasks=[];
      ordered.forEach(x=>{if(x.type==='free'){const f=S.freeTasks.find(ft=>ft.id===x.id);if(f)newFreeTasks.push(f);}});
      // Add any freeTasks not in order (safety)
      S.freeTasks.forEach(f=>{if(!newFreeTasks.find(x=>x.id===f.id))newFreeTasks.push(f);});
      S.freeTasks=newFreeTasks;
      lw(NK,S.nextOrder);lw(FK,S.freeTasks);
    }
    clr();drag=null;render();return;
  }

  if(drag.type==='wait'){
    const toEl=document.querySelector('[data-widx].dov');
    if(toEl){
      const toIdx=parseInt(toEl.dataset.widx);
      const fromIdx=drag.fromIdx;
      const wr=getWR();
      const ordered=wr.map(r=>r.isFree?{type:'free',id:r.id}:{type:'proj',projectId:r.projectId,taskId:r.taskId});
      const [moved]=ordered.splice(fromIdx,1);
      ordered.splice(toIdx,0,moved);
      S.waitOrder=ordered;
      const newWF=[];
      ordered.forEach(x=>{if(x.type==='free'){const f=S.waitFreeTasks.find(ft=>ft.id===x.id);if(f)newWF.push(f);}});
      S.waitFreeTasks.forEach(f=>{if(!newWF.find(x=>x.id===f.id))newWF.push(f);});
      S.waitFreeTasks=newWF;
      lw(WK,S.waitOrder);lw(WFK,S.waitFreeTasks);
    }
    clr();drag=null;render();return;
  }

  if(drag.type==='task'){
    const c=document.querySelector('.tcell.don');
    if(c&&c.dataset.col!==drag.colId){
      const tc=c.dataset.col;
      je({kind:'task-move',taskName:drag.tn,fromCol:drag.colId,toCol:tc,projectId:drag.pid,ts:Date.now()});
      if(drag.colId==='next'){S.nextOrder=S.nextOrder.filter(x=>!(x.type==='proj'&&x.projectId===drag.pid&&x.taskId===drag.tid)||x.type==='free');lw(NK,S.nextOrder);}
      if(tc==='next'){S.nextOrder=[...S.nextOrder,{type:'proj',projectId:drag.pid,taskId:drag.tid}];lw(NK,S.nextOrder);}
      if(drag.colId==='wait'){S.waitOrder=S.waitOrder.filter(x=>!(x.type==='proj'&&x.projectId===drag.pid&&x.taskId===drag.tid));lw(WK,S.waitOrder);}
      if(tc==='wait'){S.waitOrder=[...S.waitOrder,{type:'proj',projectId:drag.pid,taskId:drag.tid}];lw(WK,S.waitOrder);}
      S.items=S.items.map(it=>it.type!=='project'||it.id!==drag.pid?it:{...it,tasks:it.tasks.map(t=>t.id===drag.tid?{...t,status:tc}:t)});
      save();
    }
  } else if(drag.type==='row'){
    const r=document.querySelector('[data-rid].dov');
    if(r){const a=[...S.items],f=a.findIndex(x=>x.id===drag.id),t=a.findIndex(x=>x.id===r.dataset.rid);if(f>-1&&t>-1){const[m]=a.splice(f,1);a.splice(t,0,m);S.items=a;save();}}
  }
  clr();drag=null;render();
});

// ── /c parser ──────────────────────────────────────────────────
// Sintaxe acceptate (case-insensitive):
//   /c2.4          ziua 2 luna 4, fără oră (all-day)
//   /c24           ziua 24 luna curentă
//   /c2.4rz        + repetiție zilnică
//   /c2.4rz 14:00  + oră
//   /c2.4 14:00    dată + oră, fără repetiție
var RE_CCMD=/\/c(\d{1,2})(?:\.(\d{1,2}))?(rz|rs|rl|ra)?(?:\s+(\d{1,2}:\d{2}))?/i;
function parseCalCmd(text){
  var m=text.match(RE_CCMD);
  if(!m) return null;
  var now=new Date();
  var day=parseInt(m[1]);
  var month=m[2]?parseInt(m[2]):now.getMonth()+1;
  var rep=(m[3]||'').toLowerCase()||null;
  var timeStr=m[4]||null;
  return {day:day,month:month,rep:rep,timeStr:timeStr,full:m[0]};
}
function buildGCalUrl(taskTitle, parsed){
  var year=new Date().getFullYear();
  var mm=String(parsed.month).padStart(2,'0');
  var dd=String(parsed.day).padStart(2,'0');
  var dates='';
  if(parsed.timeStr){
    var hhmm=parsed.timeStr.replace(':','');
    // end = start + 30 min
    var sh=parseInt(parsed.timeStr.split(':')[0]);
    var sm=parseInt(parsed.timeStr.split(':')[1]);
    var em=sm+30; var eh=sh+(em>=60?1:0); em=em%60;
    var ehmm=String(eh).padStart(2,'0')+String(em).padStart(2,'0');
    dates=year+mm+dd+'T'+hhmm+'00/'+year+mm+dd+'T'+ehmm+'00';
  } else {
    // all-day
    dates=year+mm+dd+'/'+year+mm+dd;
  }
  var recur='';
  if(parsed.rep==='rz') recur='&recur=RRULE:FREQ%3DDAILY';
  else if(parsed.rep==='rs') recur='&recur=RRULE:FREQ%3DWEEKLY';
  else if(parsed.rep==='rl') recur='&recur=RRULE:FREQ%3DMONTHLY';
  else if(parsed.rep==='ra') recur='&recur=RRULE:FREQ%3DYEARLY';
  var title=encodeURIComponent(taskTitle.replace(RE_CCMD,'').trim());
  return 'https://calendar.google.com/calendar/render?action=TEMPLATE&text='+title+'&dates='+dates+recur;
}
// Returnează textul fără /c... și indicatorul 📅 dacă există comandă
function stripCalCmd(text){
  return text.replace(RE_CCMD,'').replace(/\s{2,}/g,' ').trim();
}

// Adaugă buton 📅 dacă taskul conține /c — și handler care deschide GCal + șterge /c

function maybeAddCalBtn(rowEl, taskName, saveFn){
  var parsed=parseCalCmd(taskName);
  if(!parsed) return;
  var btn=document.createElement('button');
  btn.textContent='📅';
  btn.title='Creează alarmă Google Calendar ('+parsed.full+')';

  function doCalendar(e){

function doExp(){

  const u=URL.createObjectURL(b);const a=document.createElement('a');
  a.href=u;a.download='pb-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(u);
}
function doImp(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const p=JSON.parse(ev.target.result);
      if(Array.isArray(p)){S.items=p;lw(SK,p);}
      else if(p.items){S.items=p.items;lw(SK,p.items);if(p.journal){S.journal=p.journal;lw(JK,p.journal);}if(p.nextOrder){S.nextOrder=p.nextOrder;lw(NK,p.nextOrder);}if(p.freeTasks){S.freeTasks=p.freeTasks;lw(FK,p.freeTasks);}if(p.waitOrder){S.waitOrder=p.waitOrder;lw(WK,p.waitOrder);}if(p.waitFreeTasks){S.waitFreeTasks=p.waitFreeTasks;lw(WFK,p.waitFreeTasks);}}
      else throw 0;
      alert('✓ Importat!');render();
    }catch(_){alert('❌ Fișier invalid.');}
  };
  r.readAsText(f);e.target.value='';
}
function doExpJournal(){
  const b=new Blob([JSON.stringify({journal:S.journal},null,2)],{type:'application/json'});
  const u=URL.createObjectURL(b);const a=document.createElement('a');
  a.href=u;a.download='pb-jurnal-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(u);
}
// Export jurnal ca .txt — pentru căutare
function doExpJournalTxt(){
  var CN2={next:'To Do',wait:'Wait',done:'Done'};
  var lines=[];
  S.journal.forEach(function(e){
    var d=new Date(e.ts);
    var ds=d.toLocaleDateString('ro-RO')+' '+d.toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'});
    if(e.kind==='task-create') lines.push('['+ds+'] TASK NOU: '+e.taskName+' → '+(CN2[e.colId]||e.colId));
    else if(e.kind==='task-move') lines.push('['+ds+'] MUTARE: '+e.taskName+': '+(CN2[e.fromCol]||e.fromCol)+' → '+(CN2[e.toCol]||e.toCol));
    else if(e.kind==='free-task-create') lines.push('['+ds+'] NEXT LIBER: '+e.taskName);
    else if(e.kind==='free-task-delete') lines.push('['+ds+'] ȘTERS NEXT: '+e.taskName);
    else if(e.kind==='share-receive') lines.push('['+ds+'] SHARE PRIMIT: '+e.taskName);
    else if(e.kind==='share-delete') lines.push('['+ds+'] SHARE ȘTERS: '+e.taskName);
    else if(e.kind==='project-create') lines.push('['+ds+'] PROIECT NOU: '+e.projectName);
    else if(e.kind==='project-archive') lines.push('['+ds+'] ARHIVAT: '+e.projectName);
    else lines.push('['+ds+'] '+e.kind+': '+(e.taskName||e.projectName||''));
  });
  var txt=lines.join('\n');
  var b2=new Blob([txt],{type:'text/plain'});
  var u2=URL.createObjectURL(b2);var a2=document.createElement('a');
  a2.href=u2;a2.download='jurnal-'+new Date().toISOString().slice(0,10)+'.txt';a2.click();URL.revokeObjectURL(u2);
}
// Export jurnal Share ca .txt
function doExpShareJournalTxt(){
  var lines=S.shareJournal.map(function(e){
    var d=new Date(e.ts);
    var ds=d.toLocaleDateString('ro-RO')+' '+d.toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'});
    return '['+ds+']\n'+e.text+'\n';
  });
  if(!lines.length){alert('Jurnalul Share e gol.');return;}
  var b=new Blob([lines.join('\n')],{type:'text/plain'});
  var u=URL.createObjectURL(b);var a=document.createElement('a');
  a.href=u;a.download='share-jurnal-'+new Date().toISOString().slice(0,10)+'.txt';a.click();URL.revokeObjectURL(u);
}
// Import jurnal Share din .txt
function doImpShareJournalTxt(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){
    var txt=ev.target.result||'';
    // Parsează blocuri [data]\ntext\n
    var blocks=txt.split(/\n(?=\[)/);
    var entries=[];
    blocks.forEach(function(block){
      var m=block.match(/^\[([^\]]+)\]\n([\s\S]+)/);
      if(m) entries.push({ts:new Date(m[1]).getTime()||Date.now(),text:m[2].trim()});
    });
    S.shareJournal=entries;lw(SHJK,S.shareJournal);
    alert('✓ Jurnal Share importat: '+entries.length+' intrări.');render();
  };
  r.readAsText(f);e.target.value='';
}
function doImpJournal(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const p=JSON.parse(ev.target.result);
      if(p.journal&&Array.isArray(p.journal)){
        S.journal=p.journal;lw(JK,S.journal);
        alert('✓ Jurnal importat: '+p.journal.length+' intrări.');render();
      } else throw 0;
    }catch(_){alert('❌ Fișier jurnal invalid.');}
  };
  r.readAsText(f);e.target.value='';
}

// ── Helpers ──
function mk(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}
function div(cls){return mk('div',cls);}
function sp(cls,txt){const s=mk('span',cls);if(txt!=null)s.textContent=txt;return s;}
function bt(cls,txt,fn){const b=mk('button','btn '+cls);b.textContent=txt;b.addEventListener('click',fn);return b;}
function ip(cls,ph,val,onI,onK){const i=mk('input',cls);i.placeholder=ph||'';i.value=val||'';if(onI)i.addEventListener('input',onI);if(onK)i.addEventListener('keydown',onK);return i;}
function ap(el,...kids){
  kids.forEach(k=>{
    if(k==null||k===false||k===undefined)return;
    if(Array.isArray(k)){k.forEach(x=>{if(x!=null)el.appendChild(typeof x==='string'?document.createTextNode(x):x);});return;}
    el.appendChild(typeof k==='string'?document.createTextNode(k):k);
  });
  return el;
}

// ── Extrage textul afișabil dintr-un task (titlu + url dacă există) ──
function getTaskDisplayText(tname){
  var parts=tname.split('\n');
  var title=parts.find(function(l){return !l.match(/^https?:\/\//);})||parts[0]||'';
  var url=parts.find(function(l){return l.match(/^https?:\/\//);})||'';
  var text=title.trim();
  if(url) text=text+(text?' — ':'')+url.trim();
  return text;
}

// ── Calculează șirurile merge conform algoritmului ──
// Fiecare rând bifat = START al unui șir
// Șirul include rândul marcat + toate rândurile ANTERIOARE (în sus)
// până la rândul marcat anterior sau marginea de sus a listei Next
// Rezultat: array de array-uri de texte (fiecare sub-array = un șir merge)
function calcMergeGroups(){
  // Operează pe shareTasks în ordinea afișată (0=sus=cel mai recent)
  var rows=S.shareTasks.map(function(item){
    return {
      rk: 's:'+item.id,
      text: getTaskDisplayText(item.name),
      id: item.id
    };
  });
  var markedIdx=[];
  rows.forEach(function(r,i){if(S.mergeFlags[r.rk]) markedIdx.push(i);});
  if(!markedIdx.length) return [];
  var groups=[];
  for(var g=0;g<markedIdx.length;g++){
    var end=markedIdx[g];
    var start=g===0?0:markedIdx[g-1]+1;
    var groupRows=rows.slice(start,end+1);
    // Ordinea inversă: marcat primul (cel mai recent), apoi urcăm
    var texts=groupRows.slice().reverse().map(function(r){return r.text;}).filter(Boolean);
    if(texts.length) groups.push({texts:texts, ids:groupRows.map(function(r){return r.id;})});
  }
  return groups;
}

// ── Merge: clipboard + acumulare în localStorage ──
function doMerge(){
  var groups=calcMergeGroups();
  if(!groups.length) return;
  var SEP='\n* ';
  var allLines=[];
  groups.forEach(function(g){allLines=allLines.concat(g.texts);});
  // Format /c: prefix pe primul rând, apoi lista cu *
  var result='/c\n* '+allLines.join(SEP);

  // 1. Clipboard
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(result).catch(function(){});
  } else {
    var ta=document.createElement('textarea');
    ta.value=result;ta.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');}catch(_){}
    document.body.removeChild(ta);
  }

  // 2. Append la log intern + shareJournal
  var existing=localStorage.getItem(CK)||'';
  var newLog=existing+(existing?'\n':'')+result;
  localStorage.setItem(CK,newLog);
  // Jurnal Share
  S.shareJournal.push({ts:Date.now(),text:result});
  lw(SHJK,S.shareJournal);

  var total=allLines.length;
  var toast=document.createElement('div');
  toast.textContent='✓ '+total+' item'+(total>1?'s':'')+' copiat'+(total>1?'e':'')+' în clipboard';
  toast.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1A1D2E;color:#10B981;border:1px solid #10B981;border-radius:9px;padding:9px 18px;font-size:12px;font-weight:700;z-index:9999;pointer-events:none;white-space:nowrap';
  document.body.appendChild(toast);
  setTimeout(function(){if(toast.parentNode)toast.parentNode.removeChild(toast);},2500);
}

// ── Descarcă tot istoricul clipboard acumulat ──
function doDownloadClipLog(){
  if(!S.shareJournal||!S.shareJournal.length){
    var t=document.createElement('div');
    t.textContent='Jurnalul clipboard e gol';
    t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#374151;color:#9CA3AF;border-radius:9px;padding:9px 18px;font-size:12px;font-weight:700;z-index:9999;pointer-events:none';
    document.body.appendChild(t);
    setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t);},2000);
    return;
  }
  // Conținut: toate concatenările în ordine cronologică, separate de linie goală
  var lines=S.shareJournal.map(function(e){return e.text;});
  var content=lines.join('\n\n');
  var blob=new Blob([content],{type:'text/plain'});
  var u=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=u;a.download='clipboard.txt';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(u);},1000);
}

// ── Șterge din Share itemurile merguite, lasă rezultatul concatenat ──
function doMergeDelete(){
  var groups=calcMergeGroups();
  if(!groups.length) return;
  var SEP='\n* ';
  // Construiește rezultatul merge (același ca doMerge)
  var allLines=[];
  groups.forEach(function(g){allLines=allLines.concat(g.texts);});
  var mergedText='/c\n* '+allLines.join(SEP);
  // Colectează toate ID-urile din toate grupurile
  var allIds=[];
  groups.forEach(function(g){allIds=allIds.concat(g.ids);});
  // Șterge itemurile originale din Share
  allIds.forEach(function(sid){
    S.shareTasks=S.shareTasks.filter(function(x){return x.id!==sid;});
    delete S.mergeFlags['s:'+sid];
  });
  // A2: adaugă rezultatul concatenat ca item nou în Share (sus)
  var newItem={id:gid(),name:mergedText,ts:Date.now()};
  S.shareTasks=[newItem,...S.shareTasks];
  lw(SHK,S.shareTasks);lw(MK,S.mergeFlags);
  render();
}

// ── Extragere metadate cu fallback cascadă ──
// 1. microlink.io → 2. jsonlink.io → 3. noembed (YouTube/etc) → 4. popup manual
function fetchMetaWithFallback(urlToFetch, shareTitle, cb){
  function buildText(t, desc){
    t=(t||'').trim(); desc=(desc||'').trim();
    var parts=[];
    if(t) parts.push(t);
    if(desc&&desc!==t) parts.push(desc);
    return parts.length ? parts.join(' — ')+'\n'+urlToFetch : null;
  }
  var isYouTube=/youtube\.com|youtu\.be/i.test(urlToFetch);
  // 1. microlink.io — sare peste YouTube (returnează mereu description generică)
  var p1 = isYouTube
    ? Promise.reject(new Error('skip youtube'))
    : fetch('https://api.microlink.io/?url='+encodeURIComponent(urlToFetch))
        .then(function(r){return r.json();})
        .then(function(d){
          if(d&&d.status==='success'&&d.data){
            var result=buildText(d.data.title, d.data.description);
            if(result) return result;
          }
          throw new Error('no data');
        });
  p1.catch(function(){
    // 2. noembed.com — excelent pentru YouTube, Vimeo, Twitter etc
    return fetch('https://noembed.com/embed?url='+encodeURIComponent(urlToFetch))
      .then(function(r){return r.json();})
      .then(function(d){
        if(d&&d.title&&d.title.trim()&&d.title!=='YouTube'){
          var author=(d.author_name||'').trim();
          var t=d.title.trim();
          var result=(author?t+' · '+author:t)+'\n'+urlToFetch;
          return result;
        }
        throw new Error('no data');
      });
  }).then(function(result){
    cb(result);
  }).catch(function(){
    // 3. jsonlink.io
    fetch('https://jsonlink.io/api/extract?url='+encodeURIComponent(urlToFetch))
      .then(function(r){return r.json();})
      .then(function(d){
        var result=buildText(d&&d.title, d&&d.description);
        if(result){cb(result);return;}
        throw new Error('no data');
      })
      .catch(function(){
        // Fallback silențios — salvează URL-ul direct, fără popup
        cb((shareTitle?shareTitle+' — ':'')+urlToFetch);
      });
  });
}

  if(!taskText||!taskText.trim())return;
  var st={id:gid(),name:taskText.trim(),ts:Date.now()};
  je({kind:'share-receive',taskName:st.name,ts:st.ts});
  S.shareTasks=[st,...S.shareTasks];
  lw(SHK,S.shareTasks);
  render();
}

function handleIncomingShare(){
  var url=new URL(window.location.href);
  var text=url.searchParams.get('addnext')||'';
  var title=url.searchParams.get('addtitle')||'';
  var sharedUrl=url.searchParams.get('addurl')||'';

  if(!text&&!title&&!sharedUrl) return; // nimic de procesat

  history.replaceState({},'',window.location.pathname);

  function afterShare(taskText){
    addToShare(taskText);
    // Închide aplicația după share — revine la aplicația sursă
    setTimeout(function(){window.close();},300);
  }

  var urlToFetch=sharedUrl||(text&&text.match(/^https?:\/\//)?text:'');
  if(urlToFetch){
    fetchMetaWithFallback(urlToFetch, title, function(taskText){
      afterShare(taskText);
    });
    return;
  }

  var taskText=text||title||'';
  afterShare(taskText);
}

function registerSW(){
  if(!('serviceWorker' in navigator)) return;
  // Nu înregistra SW în artifact Claude sau pe file://
  var host = window.location.hostname;
  if(host === 'www.claudeusercontent.com' || host === '') return;
  navigator.serviceWorker.register('sw.js').then(function(reg){
    console.log('SW înregistrat:', reg.scope);
  }).catch(function(err){
    console.log('SW eroare:', err);
  });
  // Ascultă mesaje de la SW (share când app era deschisă)
  navigator.serviceWorker.addEventListener('message',function(e){
    if(e.data&&e.data.type==='ADD_NEXT'&&e.data.text){
      addToShare(e.data.text.trim());
    }
  });
  // Verifică dacă există share pending (app era închisă)
  caches.open('projectboard-v36').then(function(cache){
    cache.match('/__pending_share__').then(function(resp){
      if(!resp)return;
      resp.text().then(function(text){
        if(!text)return;
        cache.delete('/__pending_share__');
        addToShare(text.trim());
      });
    });
  }).catch(function(){});
}

handleIncomingShare();
render();
registerSW();
</script>
