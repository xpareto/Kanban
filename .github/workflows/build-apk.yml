name: Build Android APK (TWA)
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Init Bubblewrap project non-interactive
        run: |
          mkdir twa-build && cd twa-build
          bubblewrap init \
            --manifest "https://xpareto.github.io/Kanban/manifest.json" \
            --directory "." \
            --skipPwaValidation \
            --jdkPath "/usr/lib/jvm/temurin-17-jdk-amd64" \
            --packageId "com.xpareto.kanban" \
            --name "Project Board" \
            --themeColor "#1A1D2E" \
            --backgroundColor "#1A1D2E" \
            --startUrl "/Kanban/" \
            --iconUrl "https://xpareto.github.io/Kanban/icon-512.png" \
            --maskableIconUrl "https://xpareto.github.io/Kanban/icon-512.png" \
            --appVersion "55.0" \
            --appVersionCode "55" \
            --signingMode "skip" || true

      - name: Build APK with gradle
        working-directory: twa-build
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ProjectBoard-V55
          path: twa-build/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 30

