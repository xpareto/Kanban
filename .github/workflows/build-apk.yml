name: Build Android APK (TWA)
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli
      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
      - name: Create build directory with config
        run: |
          mkdir twa-build
          cp twa-manifest.json twa-build/twa-manifest.json
      - name: Build APK with Bubblewrap
        working-directory: twa-build
        run: bubblewrap build --skipPwaValidation
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ProjectBoard-V55
          path: |
            twa-build/app-release-unsigned.apk
            twa-build/app-release-signed.apk
          if-no-files-found: warn
          retention-days: 30
       
